                    {nameKo:"?먮쿋??, nameEn:"Ephesus", coords:[37.9409,27.3413], verse:"?ㅼ쟾 1:3", intro:"?꾩떆???ъ뿭???⑷툑 嫄곗젏吏?낅땲?? 嫄곗쭞 媛瑜댁묠??吏곷㈃?섏뿬 援먰쉶瑜??섑샇?섎룄濡??붾え?곕? ?꾩엫?덉뒿?덈떎.", desc:"?먮쿋??援먰쉶??嫄곗쭞??媛瑜댁묠??吏곷㈃?섏뿬, 援먰쉶瑜?吏?ㅺ퀬 ?섑샇?섎룄濡?誘우쓬???꾨뱾 ?붾え?곕? ?꾩? 紐⑺쉶?먮줈 ?뺤떇 ?꾩엫?덉뒿?덈떎.", companions:["諛붿슱","?붾え??]},
                    {nameKo:"留덇쾶?꾨깘 (鍮뚮┰蹂?", nameEn:"Philippi", coords:[41.0125,24.2858], verse:"?ㅼ쟾 1:3", intro:"吏?띿쟻???꾩썝???꾨겮吏 ?딆? ?뚮쭩??鍮뚮┰蹂?援먰쉶?낅땲?? ?붾え?곕? ?꾨줈?섍퀬 ?붾え?곗쟾?쒕? ??좏븳 怨녹엯?덈떎.", desc:"?먮쿋?뚯뿉??留덇쾶?꾨깘濡??대룞?섎ŉ ?먮쿋?뚯뿉 ?④꺼吏??붾え?곕? ?꾨줈?섍퀬 紐⑺쉶吏移⑥쓣 二쇨린 ?꾪빐 ?붾え?곗쟾?쒕? 湲곕줉?덉뒿?덈떎.", companions:["諛붿슱","?꾧?"]},
                    {nameKo:"?덇퀬蹂쇰━", nameEn:"Nicopolis", coords:[39.0089,20.7350], verse:"??3:12", intro:"洹몃━???꾨뱶由ъ븘???곗븞??泥섏냼?낅땲?? 寃⑥슱 怨쇰룞??寃곗젙?섍퀬 洹몃젅?곗쓽 ?붾룄?먭쾶 ?붾룄?쒕? ?↔퀬???嫄곗??낅땲??", desc:"?닿납?먯꽌 寃⑥슱???섎ŉ 洹몃젅?곗뿉 ?덈뒗 ?붾룄?먭쾶 寃⑸젮 ?쒖떊(?붾룄????湲곕줉?덇퀬, 援먮??ъ뿭?먮줈 ?먭린怨좊? 吏紐⑺뻽?듬땲??", companions:["諛붿슱","?붾룄"]},
                    {nameKo:"?쒕줈??, nameEn:"Troas", coords:[39.7500,26.1667], verse:"?ㅽ썑 4:13", intro:"媛蹂댁쓽 吏묒씠 ?꾩튂????궗???ш뎄?낅땲?? 寃됱샆怨?媛二쎌콉???④꺼??梨??ㅻ줈???諛뺥빐?뱀뿉 ?섑빐 2李?泥댄룷?뱁븳 ?쒕젴吏?낅땲??", desc:"媛蹂댁쓽 吏묒뿉 以묒슂??媛二?梨낅뱾怨?寃⑥슱 寃됱샆??留↔꺼?먯뿀?쇰굹, ?ㅻ줈 ?⑹젣??湲됱뒿 湲곕룆援먯씤 ?諛뺥빐?뱀쑝濡?媛묒옉?ㅻ읇寃?濡쒕쭏 援곕????섑빐 2李?泥댄룷?섏뼱 ?뚮젮媛붿뒿?덈떎.", companions:["諛붿슱"]},
                    {nameKo:"濡쒕쭏 (2李??ъ삦 & ?쒓탳)", nameEn:"Rome (Martyrdom)", coords:[41.9028,12.4964], verse:"?ㅽ썑 4:6-8", intro:"?밸룆??吏??留덈찓瑜댄떞 媛먯삦?낅땲?? ?ㅼ쭅 ?꾧?留뚯씠 ?앷퉴吏 怨곸쓣 吏?ㅻŉ 李몄닔 ?쒓탳濡?硫대쪟愿??李⑥????깆??낅땲??", desc:"李④???吏??媛먯삦??二꾩닔濡?媛뉙삍?듬땲?? ?좎씪?섍쾶 ?섏궗 ?꾧?留뚯씠 怨곸쓣 ?앷퉴吏 吏耳곗뒿?덈떎. 李몄닔??吏곸쟾 ?꾨뱾 ?붾え?곗뿉寃?留덉?留??몄?(?붾え?고썑??瑜??④린硫??좏븳 ?몄???留덉낀?ㅺ퀬 ?좎뼵?덉뒿?덈떎.", companions:["諛붿슱","?꾧?"]}
                ]
            }
        };

        let map, currentJourneyId=1, routePolyline, markers=[], currentStationIndex=-1;
        let animationTimer=null, isAnimating=false, currentAnimationStep=0;
        let regionsLayerGroup=null, drawerOpen=false;

        // [C] Peek bottom sheet
        let cardState = 'hidden'; // 'hidden' | 'peek' | 'expanded'
        const PEEK_H = 80; // px visible above bottom edge in peek state

        function toggleCardExpand() {
            if (cardState === 'peek') expandCard();
            else if (cardState === 'expanded') collapseCard();
        }

        function expandCard() {
            cardState = 'expanded';
            const card = document.getElementById('floating-info-card');
            card.style.transform = 'translateY(0)';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const cardH = card.offsetHeight;
                document.getElementById('map').style.bottom = cardH + 'px';
                setTimeout(() => {
                    map.invalidateSize();
                    const s = journeysData[currentJourneyId].stations[currentStationIndex];
                    if (s) map.panTo(s.coords, {animate: true, duration: 0.4});
                }, 60);
            }));
        }

        function collapseCard() {
            cardState = 'peek';
            const card = document.getElementById('floating-info-card');
            card.style.transform = `translateY(calc(100% - ${PEEK_H}px))`;
            document.getElementById('map').style.bottom = PEEK_H + 'px';
            setTimeout(() => map.invalidateSize(), 320);
        }

        const journeyColors = {1:"#FFC000", 2:"#10b981", 3:"#3b82f6", 4:"#ef4444", 5:"#8b5cf6"};

        function initMap() {
            map = L.map('map', {center:[38.0,24.0], zoom:5, minZoom:4, maxZoom:10, zoomControl:false});
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains:'abcd', maxZoom:20
            }).addTo(map);
            L.control.zoom({position:'bottomleft'}).addTo(map);
            regionsLayerGroup = L.layerGroup().addTo(map);
            regionsData.forEach(r => {
                L.marker(r.coords, {
                    icon: L.divIcon({
                        className:'bg-transparent border-0 pointer-events-none',
                        html:`<div class="${r.size} tracking-widest whitespace-nowrap italic text-center select-none" style="text-shadow:0 0 8px rgba(255,255,255,1),0 0 4px rgba(255,255,255,1),1px 1px 0 rgba(255,255,255,.9);">${r.name}</div>`,
                        iconSize:[160,24], iconAnchor:[80,12]
                    }), interactive:false
                }).addTo(regionsLayerGroup);
            });
            renderJourney(1);
        }

        function hexToRgb(hex) {
            let f=hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i,(m,r,g,b)=>r+r+g+g+b+b);
            let r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(f);
            return r?`${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}`:"255, 192, 0";
        }

        function createNormalIcon(id) {
            const c=journeyColors[id];
            return L.divIcon({className:'custom-div-icon-normal', html:`<div style="background-color:${c};" class="w-3 h-3 rounded-full border-2 border-white shadow-md cursor-pointer hover:scale-125 transition-transform duration-200"></div>`, iconSize:[12,12], iconAnchor:[6,6]});
        }

        function createStartIcon(id) {
            return L.divIcon({className:'custom-div-icon-start',html:`<div style="background-color:#E74C3C;" class="w-3 h-3 rounded-full border-2 border-white shadow-md cursor-pointer hover:scale-125 transition-transform duration-200"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
        }

        function createEndIcon(id) {
            return L.divIcon({className:'custom-div-icon-end',html:`<div style="background-color:#3860BE;" class="w-3 h-3 rounded-full border-2 border-white shadow-md cursor-pointer hover:scale-125 transition-transform duration-200"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
        }

        function createActiveIcon(id) {
            const c=journeyColors[id], rgb=hexToRgb(c);
            return L.divIcon({className:'custom-div-icon-active', html:`<div style="background-color:${c};--pulse-color:rgba(${rgb},.75);" class="active-pulse-marker w-5 h-5 rounded-full border-2 border-white cursor-pointer flex items-center justify-center shadow-2xl"><div class="w-1.5 h-1.5 bg-white rounded-full"></div></div>`, iconSize:[20,20], iconAnchor:[10,10]});
        }

        function renderJourney(id) {
            currentJourneyId = id;
            const j = journeysData[id];
            if (routePolyline) map.removeLayer(routePolyline);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Update drawer content
            document.getElementById('journey-period').textContent = j.period;
            document.getElementById('journey-letters').textContent = `?뱷 ${j.letters}`;
            document.getElementById('journey-title').textContent = j.title;
            document.getElementById('journey-description').textContent = j.description;

            // Companions (compact)
            const cl = document.getElementById('companions-list');
            cl.innerHTML = '';
            j.companions.forEach(c => {
                const co = companionIcons[c];
                if (!co) return;
                const b = document.createElement('span');
                b.className = "flex items-center gap-0.5 text-[10px] bg-charcoal border border-[#333] text-white px-1.5 py-0.5 font-medium";
                b.innerHTML = `<span>${co.icon}</span><span>${c}</span>`;
                cl.appendChild(b);
            });

            // Tabs
            document.querySelectorAll('.journey-tab').forEach(t => {
                t.className = "journey-tab h-full flex-shrink-0 px-3 text-[11px] font-bold text-ash hover:text-gold transition-all duration-200 flex items-center";
                t.style.background = '';
            });
            const ab = document.getElementById(`btn-journey-${id}`);
            if (ab) { ab.className = "journey-tab h-full flex-shrink-0 px-3 text-[11px] font-bold bg-gold text-black transition-all duration-200 flex items-center"; }

            // Timeline
            const tl = document.getElementById('timeline-list');
            tl.innerHTML = '';
            const coords = [];
            j.stations.forEach((s, i) => {
                coords.push(s.coords);
                const item = document.createElement('div');
                item.className = "bg-black border border-charcoal hover:border-[#444] px-2.5 py-2 cursor-pointer transition-all duration-200 flex items-center gap-2";
                item.onclick = () => { stopVoyageAnimation(); focusStation(i); };
                item.id = `timeline-item-${i}`;
                item.innerHTML = `
                    <span class="index-badge w-5 h-5 rounded-full bg-charcoal border border-[#333] flex items-center justify-center text-[10px] text-gold font-bold flex-shrink-0 transition-all">${i+1}</span>
                    <div class="flex-1 min-w-0 flex items-center justify-between gap-1">
                        <span class="station-title text-[11px] font-bold text-white truncate transition-colors">${s.nameKo}</span>
                        <span class="text-[9px] text-ash flex-shrink-0">${s.verse}</span>
                    </div>`;
                tl.appendChild(item);

                const icon = i===0 ? createStartIcon(id) : i===j.stations.length-1 ? createEndIcon(id) : createNormalIcon(id);
                const marker = L.marker(s.coords, {icon}).addTo(map);
                marker.on('click', () => { stopVoyageAnimation(); focusStation(i); });
                markers.push(marker);
            });

            routePolyline = L.polyline(coords, {color:journeyColors[id], weight:3.5, opacity:.85, dashArray:id===4?'5, 8':null}).addTo(map);
            map.fitBounds(routePolyline.getBounds(), {padding:[70,70]});
        }

        function focusStation(index) {
            const s = journeysData[currentJourneyId].stations[index];
            map.setView(s.coords, 7, {animate:true, duration:1.2});
            const lastIdx = journeysData[currentJourneyId].stations.length - 1;
            markers.forEach((m,i) => {
                if (i===index) { m.setIcon(createActiveIcon(currentJourneyId)); if (m.setZIndexOffset) m.setZIndexOffset(1000); }
                else { m.setIcon(i===0?createStartIcon(currentJourneyId):i===lastIdx?createEndIcon(currentJourneyId):createNormalIcon(currentJourneyId)); if (m.setZIndexOffset) m.setZIndexOffset(0); }
            });
            displayStationCard(index);
            document.querySelectorAll('#timeline-list > div').forEach((el,i) => {
                const badge = el.querySelector('.index-badge');
                const title = el.querySelector('.station-title');
                if (i===index) {
                    el.className = "bg-gold-bg/20 border border-gold px-2.5 py-2 cursor-pointer transition-all duration-200 flex items-center gap-2";
                    if (badge) badge.className = "index-badge w-5 h-5 rounded-full bg-gold border border-[#917300] flex items-center justify-center text-[10px] text-black font-black flex-shrink-0 transition-all";
                    if (title) title.className = "station-title text-[11px] font-bold text-gold truncate transition-colors";
                } else {
                    el.className = "bg-black border border-charcoal hover:border-[#444] px-2.5 py-2 cursor-pointer transition-all duration-200 flex items-center gap-2";
                    if (badge) badge.className = "index-badge w-5 h-5 rounded-full bg-charcoal border border-[#333] flex items-center justify-center text-[10px] text-gold font-bold flex-shrink-0 transition-all";
                    if (title) title.className = "station-title text-[11px] font-bold text-white truncate transition-colors";
                }
            });
            const ai = document.getElementById(`timeline-item-${index}`);
            if (ai) ai.scrollIntoView({behavior:'smooth', block:'nearest'});
        }

        function displayStationCard(index) {
            currentStationIndex = index;
            const s = journeysData[currentJourneyId].stations[index];
            document.getElementById('station-name-ko').textContent = s.nameKo;
            document.getElementById('station-name-en').textContent = s.nameEn;
            document.getElementById('station-intro').textContent = s.intro;
            document.getElementById('station-verse').textContent = `?뱰 ${s.verse}`;
            document.getElementById('station-desc').textContent = s.desc;
            const cc = document.getElementById('station-companions');
            cc.innerHTML = '';
            s.companions.forEach(c => {
                const co = companionIcons[c];
                if (!co) return;
                const b = document.createElement('span');
                b.className = "inline-flex items-center gap-1 text-[10px] bg-charcoal border border-[#333] text-white px-2 py-1 font-medium";
                b.innerHTML = `<span>${co.icon}</span><span>${c}</span>`;
                cc.appendChild(b);
            });
            const total = journeysData[currentJourneyId].stations.length;
            const prevBtn = document.getElementById('btn-prev-station');
            const nextBtn = document.getElementById('btn-next-station');
            if (prevBtn) { const d=index===0; prevBtn.style.opacity=d?'0.2':'1'; prevBtn.style.pointerEvents=d?'none':'auto'; prevBtn.style.cursor=d?'not-allowed':'pointer'; }
            if (nextBtn) { const d=index===total-1; nextBtn.style.opacity=d?'0.2':'1'; nextBtn.style.pointerEvents=d?'none':'auto'; nextBtn.style.cursor=d?'not-allowed':'pointer'; }
            const card = document.getElementById('floating-info-card');
            card.style.opacity = '1';
            card.style.pointerEvents = 'auto';

            // [C] Mobile: preserve expanded/peek state when navigating; first open ??peek
            if (window.innerWidth < 768) {
                if (cardState === 'expanded') {
                    card.style.transform = 'translateY(0)';
                    map.panTo(s.coords, {animate: true, duration: 0.4});
                } else {
                    cardState = 'peek';
                    card.style.transform = `translateY(calc(100% - ${PEEK_H}px))`;
                    document.getElementById('map').style.bottom = PEEK_H + 'px';
                    setTimeout(() => map.invalidateSize(), 60);
                }
            } else {
                cardState = 'expanded';
                card.style.transform = 'translateY(0)';
            }
        }

        function prevStation() {
            if (currentStationIndex > 0) { stopVoyageAnimation(); focusStation(currentStationIndex - 1); }
        }

        function nextStation() {
            const total = journeysData[currentJourneyId].stations.length;
            if (currentStationIndex < total - 1) { stopVoyageAnimation(); focusStation(currentStationIndex + 1); }
        }

        function closeInfoCard() {
            cardState = 'hidden';
            const card = document.getElementById('floating-info-card');
            card.style.transform = 'translateY(100%)';
            card.style.opacity = '0';
            card.style.pointerEvents = 'none';
            if (window.innerWidth < 768) {
                document.getElementById('map').style.bottom = '0';
                setTimeout(() => map.invalidateSize(), 320);
            }
        }

        function toggleDrawer() {
            drawerOpen ? closeDrawer() : openDrawer();
        }

        function openDrawer() {
            drawerOpen = true;
            const d = document.getElementById('timeline-drawer');
            const b = document.getElementById('drawer-backdrop');
            const tb = document.getElementById('top-bar');
            const topOffset = tb.offsetTop + tb.offsetHeight;
            d.style.top = topOffset + 'px';
            b.style.top = topOffset + 'px';
            d.style.transform = 'translateX(0)';
            b.style.opacity = '1';
            b.style.pointerEvents = 'auto';
            setTimeout(() => { if (map) map.invalidateSize(); }, 320);
        }

        function closeDrawer() {
            drawerOpen = false;
            const d = document.getElementById('timeline-drawer');
            const b = document.getElementById('drawer-backdrop');
            d.style.transform = 'translateX(-100%)';
            b.style.opacity = '0';
            b.style.pointerEvents = 'none';
            b.style.top = '';
            setTimeout(() => { if (map) map.invalidateSize(); }, 320);
        }

        function switchJourney(id) { stopVoyageAnimation(); closeInfoCard(); renderJourney(id); }
        function toggleVoyageAnimation() { isAnimating ? stopVoyageAnimation() : startVoyageAnimation(); }

        function startVoyageAnimation() {
            const j = journeysData[currentJourneyId];
            isAnimating = true; currentAnimationStep = 0;
            const btn = document.getElementById('btn-animate');
            btn.textContent = '???뺤?'; btn.style.color = '#ef4444';
            closeInfoCard();
            map.setView(j.stations[0].coords, 6);
            focusStation(0); currentAnimationStep = 1;
            animationTimer = setInterval(() => {
                if (currentAnimationStep < j.stations.length) { focusStation(currentAnimationStep); currentAnimationStep++; }
                else stopVoyageAnimation();
            }, 3500);
        }

        function stopVoyageAnimation() {
            if (animationTimer) { clearInterval(animationTimer); animationTimer = null; }
            isAnimating = false; currentAnimationStep = 0;
            const btn = document.getElementById('btn-animate');
            if (btn) { btn.textContent = '???ъ깮'; btn.style.color = '#FFC000'; }
        }

        window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
        window.onload = () => { initMap(); };
    </script>
