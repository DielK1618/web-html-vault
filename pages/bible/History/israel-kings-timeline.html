      '베가가 이미 므나헴 재위 시 길르앗에서 공동섭정 또는 대항왕으로 세력을 키웠다는 학자들의 견해가 있음'
    ],
    prophets:['호세아'],
    foreign:'앗수르',
    coregency: null
  },
  {
    id:'n17', name:'베가', start:752, end:732, rating:3,
    mother:'미상', age:null, duration:'20년(공동섭정 포함)', death:'호세아에게 피살',
    refs:['왕하 15:27-31','사 7장'],
    eval:'여호와 보시기에 악을 행하여 이스라엘로 범죄하게 한 느밧의 아들 여로보암의 죄에서 떠나지 아니함(왕하 15:28)',
    grade:'극악',
    summary:'아람과 연합하여 유다를 공격했으나 앗수르 침공으로 이스라엘 영토의 절반을 잃음.',
    acts:[
      '브가히야를 죽이고 왕이 됨. 성경의 통치 기간 20년은 공동섭정 포함(왕하 15:27)',
      '아람 왕 르신과 연합하여 유다를 공격했으나(시로-에브라임 전쟁) 이사야를 통해 실패 예언을 받음(사 7:1-9)',
      '유다 왕 아하스가 앗수르에 도움 요청, 앗수르 디글랏빌레셀 3세가 갈릴리·납달리·길르앗을 점령하고 주민을 앗수르로 이주(왕하 15:29)',
      '르신도 앗수르에 의해 피살됨(왕하 16:9)',
      '엘라의 아들 호세아의 쿠데타로 암살당함(왕하 15:30)',
      '이사야의 임마누엘 예언(사 7:14)이 이 전쟁 위기를 배경으로 선포됨'
    ],
    prophets:['호세아','이사야','오뎃'],
    foreign:'아람(르신), 앗수르(디글랏빌레셀 3세), 남유다(아하스)',
    coregency: {start:752, end:740, with:'므나헴'}
  },
  {
    id:'n18', name:'호세아', start:732, end:722, rating:3,
    mother:'미상', age:null, duration:'9년', death:'앗수르 포로(사망 시기 불명)',
    refs:['왕하 17:1-41'],
    eval:'그가 여호와 보시기에 악을 행하였으나 그의 전 이스라엘 여러 왕들과 같지는 아니하였더라(왕하 17:2)',
    grade:'악',
    summary:'북이스라엘 마지막 왕. 앗수르 배반으로 3년 포위 끝에 BC 722년 사마리아 함락, 북왕국 멸망.',
    acts:[
      '엘라의 아들로 베가를 암살하고 앗수르의 승인 하에 왕이 됨(왕하 15:30)',
      '앗수르 살만에셀 5세에게 조공을 바치다 이집트 왕 소에게 사신을 보내며 조공 거부(왕하 17:3-4)',
      '살만에셀 5세가 사마리아를 3년간 포위(BC 724-722)(왕하 17:5)',
      '사르곤 2세 즉위 후 BC 722년 사마리아 최종 함락, 이스라엘 백성 27,290명 앗수르로 이주(왕하 17:6, 앗수르 기록)',
      '앗수르가 사마리아에 이방 민족을 이주시켜 혼합 종족인 사마리아인 출현의 배경이 됨(왕하 17:24-41)',
      '북이스라엘 209년, 다윗 통일왕국으로부터 분리된 지 정확히 209년 만에 역사의 무대에서 사라짐'
    ],
    prophets:['호세아(선지자)','미가'],
    foreign:'앗수르(살만에셀 5세·사르곤 2세), 이집트(소)',
    coregency: null
  }
];
const GC={
  0:{c:'g0',bd:'background:#10b981;color:#fff',t:'선한 왕'},
  1:{c:'g1',bd:'background:#38bdf8;color:#fff',t:'부분 선'},
  2:{c:'g2',bd:'background:#fb923c;color:#fff',t:'악한 왕'},
  3:{c:'g3',bd:'background:#f43f5e;color:#fff',t:'극악한 왕'},
  4:{c:'g4',bd:'background:#a855f7;color:#fff',t:'극악(여왕)'},
};

function render(){
  const cs=document.getElementById('cs'),cn=document.getElementById('cn'),ca=document.getElementById('cax');
  cs.innerHTML='';cn.innerHTML='';ca.innerHTML='';
  const th=(SY-560)*ppy;
  document.getElementById('tlc').style.height=th+'px';
  ca.style.height=th+'px';
  for(let y=940;y>=580;y-=20){
    const d=document.createElement('div');
    d.className='axtk';d.style.top=((SY-y)*ppy)+'px';
    d.innerHTML='<span>'+y+'</span>';ca.appendChild(d);
  }
  const draw=(kings,col,isSouth)=>{
    kings.forEach((k,kidx)=>{
      const top=(SY-k.start)*ppy;
      const naturalH=(k.start-k.end)*ppy;
      const h=Math.max(naturalH,6);  // actual bar height stays true to timeline
      const gc=GC[k.rating]||GC[2];
      // year label
      const yl=document.createElement('div');
      yl.className=isSouth?'axyr-s':'axyr-n';
      yl.style.top=((SY-k.start)*ppy-6)+'px';
      yl.style[isSouth?'left':'right']='1px';
      yl.textContent=k.start;
      ca.appendChild(yl);
      // row
      const row=document.createElement('div');
      row.className='krow '+(isSouth?'s':'n');
      row.style.top=top+'px';row.style.height=h+'px';
      const bar=document.createElement('div');
      const isShort = h < 14;
      bar.className='kbar '+gc.c+(isShort?' thin':'');
      bar.id='bar-'+k.id;
      bar.style.height=isShort ? '5px' : (h-2)+'px';
      if(isShort){
        bar.style.padding='0';
        bar.style.overflow='visible';
        bar.style.zIndex='30';  // always on top so badge is clickable
      }
      // LABEL LOGIC
      // Short king (bar too thin for name): show as colored stripe + floating name badge
      const SHORT_H = 14;
      if(h >= SHORT_H){
        const nm=document.createElement('span');
        nm.className='bname';nm.textContent=(kidx+1)+'. '+k.name;bar.appendChild(nm);
      }
      if(k.coregency){
        const sp=document.createElement('div');sp.className='cosp';
        sp.style.height=(((k.coregency.start-k.coregency.end)/(k.start-k.end))*100)+'%';
        bar.appendChild(sp);
      }
      // For short kings: badge goes INSIDE bar so it's always centered on it
      if(h < 14){
        const badge=document.createElement('div');
        badge.className='short-badge';
        const bgColor  ={g0:'#d1fae5',g1:'#e0f2fe',g2:'#ffedd5',g3:'#ffe4e6',g4:'#f3e8ff'}[gc.c]||'#f1f5f9';
        const bdrColor ={g0:'#10b981',g1:'#38bdf8',g2:'#fb923c',g3:'#f43f5e',g4:'#a855f7'}[gc.c]||'#94a3b8';
        const txtColor ={g0:'#065f46',g1:'#0c4a6e',g2:'#7c2d12',g3:'#881337',g4:'#581c87'}[gc.c]||'#1e293b';
        badge.style.background=bgColor;
        badge.style.borderColor=bdrColor;
        badge.style.color=txtColor;
        badge.textContent=(kidx+1)+'. '+k.name;
        bar.appendChild(badge);
      }

      bar.addEventListener('click',()=>showInfo(k,isSouth));
      row.appendChild(bar);
      col.appendChild(row);
    });
    if(!isSouth){
      const fb=document.createElement('div');fb.className='fbdg';
      fb.style.top=((SY-722)*ppy)+'px';fb.style.left='1px';
      fb.textContent='722 북이스라엘 멸망';ca.appendChild(fb);
    } else {
      const fb=document.createElement('div');fb.className='fbdg';
      fb.style.top=((SY-586)*ppy)+'px';fb.style.right='1px';
      fb.textContent='586 남유다 멸망';ca.appendChild(fb);
    }
  };
  draw(southKings,cs,true);draw(northKings,cn,false);
}

function showInfo(k,isSouth){
  if(selBar)selBar.classList.remove('sel');
  const bar=document.getElementById('bar-'+k.id);
  if(bar){bar.classList.add('sel');selBar=bar;}
  curK=k;curSide=isSouth;
  const gc=GC[k.rating]||GC[2];
  document.getElementById('pkw').textContent=isSouth?'남유다 (JUDAH)':'북이스라엘 (ISRAEL)';
  document.getElementById('pkw').style.cssText=isSouth?'background:#2563eb;color:#fff':'background:#dc2626;color:#fff';
  document.getElementById('pnm').textContent=k.name;
  document.getElementById('pyr').textContent='BC '+k.start+' – '+k.end;
  document.getElementById('pbdg').innerHTML=
    '<span class="bdg" style="'+gc.bd+'">'+gc.t+'</span>'+
    '<span class="bdg" style="background:#f1f5f9;color:#475569">'+k.duration+'</span>'+
    '<span class="bdg" style="background:#f1f5f9;color:#475569">사망: '+k.death+'</span>'+
    (k.coregency?'<span class="bdg" style="background:#fef3c7;color:#92400e">공동섭정</span>':'');
  const acts=(k.acts||[]).map(a=>'<li>'+a+'</li>').join('');
  const refs=(k.refs||[]).map(r=>'<span class="bdg" style="background:#fefce8;color:#92400e;border:1px solid #fde68a">'+r+'</span>').join(' ');
  const proph=k.prophets&&k.prophets.length
    ?k.prophets.map(p=>'<span class="bdg" style="background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe">'+p+'</span>').join(' ')
    :'<span style="font-size:11px;color:#94a3b8">해당 없음</span>';
  const ct=k.coregency?'BC '+k.coregency.start+'–'+k.coregency.end+' ('+k.coregency.with+'와 공동통치)':'없음';
  document.getElementById('pcont').innerHTML=
    '<div class="ic"><div class="stt">기본 신상</div><div class="igrd">'+
    '<div class="icell"><span>어머니</span><b>'+k.mother+'</b></div>'+
    '<div class="icell"><span>즉위 나이</span><b>'+(k.age?k.age+'세':'미상')+'</b></div>'+
    '<div class="icell"><span>재위 기간</span><b>'+k.duration+'</b></div>'+
    '<div class="icell"><span>사망 원인</span><b>'+k.death+'</b></div>'+
    '<div class="icell fu"><span>공동섭정</span><b>'+ct+'</b></div></div></div>'+
    '<div class="ic ac"><div class="stt">성경적 평가</div><p style="font-size:11px;color:#78350f;font-style:italic;line-height:1.65">&ldquo;'+k.eval+'&rdquo;</p></div>'+
    '<div class="ic"><div class="stt">주요 행적</div><ul class="alist">'+acts+'</ul></div>'+
    '<div class="ic ind"><div class="stt">동시대 선지자</div><div style="display:flex;flex-wrap:wrap;gap:4px">'+proph+'</div></div>'+
    '<div class="ic"><div class="stt">동시대 외세</div><p style="font-size:11px;color:#374151">'+(k.foreign||'—')+'</p></div>'+
    '<div class="ic"><div class="stt">성경 참고 구절</div><div style="display:flex;flex-wrap:wrap;gap:4px">'+refs+'</div></div>';
  document.getElementById('dpanel').classList.add('open');
  document.getElementById('ovl').classList.add('open');
}
function closePanel(){
  document.getElementById('dpanel').classList.remove('open');
  document.getElementById('ovl').classList.remove('open');
  if(selBar){selBar.classList.remove('sel');selBar=null;}
}
function navPanel(d){
  if(!curK)return;
  const list=curSide?southKings:northKings;
  const idx=list.findIndex(k=>k.id===curK.id);
  const nx=list[idx+d];if(nx)showInfo(nx,curSide);
}

window.addEventListener('load',render);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
</script>
</body>
</html>
