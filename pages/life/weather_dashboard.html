<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 날씨 예측 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:13px;line-height:1.5}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:10px}
.filter-panel{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 20px;position:sticky;top:0;z-index:100}
.panel-title{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.flabel{font-size:11px;font-weight:500;color:#8e8e93}
select,input[type=text],input[type=date]{height:34px;border:1px solid #e5e5ea;border-radius:8px;padding:0 10px;font-size:12px;font-family:inherit;color:#1d1d1f;background:#fafafa;outline:none;transition:border-color .15s,background .15s}
select:hover,input:hover{border-color:#c7c7cc;background:#fff}
select:focus,input:focus{border-color:#007aff;background:#fff;box-shadow:0 0 0 3px rgba(0,122,255,.1)}
.slider-row{display:flex;align-items:center;gap:8px}
input[type=range]{-webkit-appearance:none;width:100px;height:4px;background:#e5e5ea;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#007aff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sval{font-size:12px;font-weight:600;color:#007aff;min-width:26px}
.btn-apply{height:34px;padding:0 18px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.btn-apply:hover{background:#0071e3}
.btn-apply:active{transform:scale(.97)}
.btn-apply:disabled{background:#c7c7cc;cursor:not-allowed;transform:none}
.recent-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center}
.rtag{font-size:11px;padding:3px 9px;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:20px;cursor:pointer;color:#636366;transition:all .12s}
.rtag:hover{background:#007aff;border-color:#007aff;color:#fff}
.kpi-bar{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 20px}
.kpi-title{font-size:15px;font-weight:600;color:#1d1d1f;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.kc{background:#f5f5f7;border-radius:10px;padding:10px 12px}
.kc-label{font-size:11px;color:#8e8e93;margin-bottom:3px}
.kc-val{font-size:18px;font-weight:600;color:#1d1d1f;line-height:1.2}
.kbadge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:3px;vertical-align:middle;background:#e8f8ef;color:#166534}
.status-bar{padding:9px 20px;font-size:12px;display:none;align-items:center;gap:8px}
.s-info{background:#eff6ff;color:#1d4ed8;border-bottom:1px solid #bfdbfe}
.s-err{background:#fff1f0;color:#b91c1c;border-bottom:1px solid #fecaca}
.s-ok{background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #bfdbfe;border-top-color:#007aff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{padding:4px 20px 8px;display:none;background:#fff;border-bottom:1px solid #f0f0f5}
.prog-track{height:3px;background:#e5e5ea;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#007aff;border-radius:2px;transition:width .4s}
.prog-label{font-size:11px;color:#8e8e93;margin-top:4px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 20px;background:#fff;border-bottom:1px solid #f0f0f5}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#636366}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.matrix-wrap{overflow-x:auto;padding:0 0 24px}
table{border-collapse:collapse;width:max-content;min-width:100%}
th,td{padding:8px 10px;border:1px solid #f0f0f5;vertical-align:top}
thead th{background:#fafafa;font-size:10px;font-weight:600;color:#8e8e93;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:10}
th:first-child,td:first-child{position:sticky;left:0;z-index:5;background:#fff;min-width:84px}
thead th:first-child{z-index:20;background:#fafafa}
.ch-h{background:#fafafa!important;text-align:center;border-bottom:2px solid #e5e5ea!important}
.ch-o{background:#f0f7ff!important;text-align:center;border-bottom:2px solid #93c5fd!important;color:#1d4ed8!important}
.ch-a{background:#f5f3ff!important;text-align:center;border-bottom:2px solid #a78bfa!important;color:#5b21b6!important}
.sbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.sb-h{background:#f0f0f5;color:#636366}
.sb-o{background:#dbeafe;color:#1e40af}
.sb-a{background:#ede9fe;color:#5b21b6}
.weather-cell{min-width:118px;font-size:11px}
.wicon{font-size:20px;display:block;line-height:1.3;margin-bottom:1px}
.cond-txt{font-size:11px;color:#636366;white-space:nowrap}
.tmin{font-size:12px;font-weight:600;color:#0071e3}
.tmax{font-size:12px;font-weight:600;color:#e53e3e}
.sep{color:#d1d1d6;margin:0 1px}
.meta{font-size:10px;color:#8e8e93}
.rain-lbl{font-weight:600;color:#1a56db}
.hum{color:#0891b2}
.wnd{color:#7c3aed}
.cell-loading{text-align:center;padding:18px 10px;background:#fafafa;min-width:118px}
.cell-ai{text-align:center;padding:18px 10px;background:#f9f7ff;font-size:11px;color:#a78bfa;min-width:140px}
.cell-empty{text-align:center;color:#d1d1d6;font-size:11px;padding:18px 10px;background:#fafafa;min-width:118px}
.cell-fail{text-align:center;color:#fca5a5;font-size:11px;padding:18px 10px;background:#fff5f5;min-width:118px}
</style>
</head>
<body>

<div class="filter-panel">
  <div class="panel-title">날씨 조회 설정</div>
  <div class="filter-row">
    <div class="fg">
      <span class="flabel">나라</span>
      <select id="countrySelect" onchange="onCountryChange()">
        <option value="">선택</option>
        <option value="대한민국 🇰🇷">대한민국 🇰🇷</option>
        <option value="일본 🇯🇵">일본 🇯🇵</option>
        <option value="미국 🇺🇸">미국 🇺🇸</option>
        <option value="영국 🇬🇧">영국 🇬🇧</option>
        <option value="프랑스 🇫🇷">프랑스 🇫🇷</option>
        <option value="독일 🇩🇪">독일 🇩🇪</option>
        <option value="호주 🇦🇺">호주 🇦🇺</option>
        <option value="중국 🇨🇳">중국 🇨🇳</option>
        <option value="태국 🇹🇭">태국 🇹🇭</option>
        <option value="기타 ✏️">기타 ✏️</option>
      </select>
    </div>
    <div class="fg" id="citySelectGroup">
      <span class="flabel">도시</span>
      <select id="citySelect" onchange="onCityChange()"><option>나라 먼저 선택</option></select>
    </div>
    <div class="fg" id="cityInputGroup" style="display:none">
      <span class="flabel">도시 직접 입력</span>
      <input type="text" id="cityInput" placeholder="예: 파주, Paju" style="width:130px">
    </div>
    <div class="fg" id="countryInputGroup" style="display:none">
      <span class="flabel">나라 직접 입력</span>
      <input type="text" id="countryInput" placeholder="예: 캐나다" style="width:110px">
    </div>
    <div class="fg">
      <span class="flabel">시작일</span>
      <input type="date" id="dateStart">
    </div>
    <div class="fg">
      <span class="flabel">종료일</span>
      <input type="date" id="dateEnd">
    </div>
    <div class="fg">
      <span class="flabel">과거 데이터</span>
      <div class="slider-row">
        <input type="range" id="yearSlider" min="1" max="5" value="3" step="1"
          oninput="document.getElementById('yearVal').textContent=this.value+'년'">
        <span class="sval" id="yearVal">3년</span>
      </div>
    </div>
    <div class="fg">
      <span class="flabel">&nbsp;</span>
      <button class="btn-apply" id="applyBtn" onclick="applyFilter()">조회</button>
    </div>
  </div>
  <div class="recent-row" id="recentRow"></div>
</div>

<div id="statusBar" class="status-bar"></div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel"></div>
</div>

<div class="kpi-bar">
  <div class="kpi-title" id="kpiTitle">도시를 선택하고 조회하세요</div>
  <div class="kpi-grid" id="kpiGrid">
    <div class="kc"><div class="kc-label">평균 최고기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 최저기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">강수일수</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">총 강수량</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 습도</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 풍속</div><div class="kc-val">—</div></div>
  </div>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#f5f5f7;border:1px solid #d1d1d6"></div>과거 실측 (Open-Meteo Archive)</div>
  <div class="li"><div class="ld" style="background:#dbeafe;border:1px solid #93c5fd"></div>공식 예보 (Open-Meteo Forecast)</div>
  <div class="li"><div class="ld" style="background:#ede9fe;border:1px solid #a78bfa"></div>AI 예측 (Claude — 추후 연동)</div>
  <div class="li"><div class="ld" style="background:#dbeafe"></div>약한 비 1–5mm</div>
  <div class="li"><div class="ld" style="background:#93c5fd"></div>보통 비 5–15mm</div>
  <div class="li"><div class="ld" style="background:#3b82f6"></div>강한 비 15mm+</div>
</div>

<div class="matrix-wrap">
  <table>
    <thead id="matrixHead"></thead>
    <tbody id="matrixBody"></tbody>
  </table>
</div>

<script>
const CITY_DATA={
  "대한민국 🇰🇷":{cities:["서울","파주","인천","수원","부산","대구","광주","제주","직접 입력..."],coords:{"서울":[37.5665,126.9780],"파주":[37.7597,126.7801],"인천":[37.4563,126.7052],"수원":[37.2636,127.0286],"부산":[35.1796,129.0756],"대구":[35.8714,128.6014],"광주":[35.1595,126.8526],"제주":[33.4996,126.5312]}},
  "일본 🇯🇵":{cities:["도쿄","오사카","삿포로","후쿠오카","교토","나고야","직접 입력..."],coords:{"도쿄":[35.6762,139.6503],"오사카":[34.6937,135.5023],"삿포로":[43.0618,141.3545],"후쿠오카":[33.5904,130.4017],"교토":[35.0116,135.7681],"나고야":[35.1815,136.9066]}},
  "미국 🇺🇸":{cities:["뉴욕","LA","시카고","시애틀","마이애미","라스베이거스","직접 입력..."],coords:{"뉴욕":[40.7128,-74.0060],"LA":[34.0522,-118.2437],"시카고":[41.8781,-87.6298],"시애틀":[47.6062,-122.3321],"마이애미":[25.7617,-80.1918],"라스베이거스":[36.1699,-115.1398]}},
  "영국 🇬🇧":{cities:["런던","맨체스터","에든버러","버밍엄","직접 입력..."],coords:{"런던":[51.5074,-0.1278],"맨체스터":[53.4808,-2.2426],"에든버러":[55.9533,-3.1883],"버밍엄":[52.4862,-1.8904]}},
  "프랑스 🇫🇷":{cities:["파리","니스","리옹","보르도","직접 입력..."],coords:{"파리":[48.8566,2.3522],"니스":[43.7102,7.2620],"리옹":[45.7640,4.8357],"보르도":[44.8378,-0.5792]}},
  "독일 🇩🇪":{cities:["베를린","뮌헨","함부르크","프랑크푸르트","직접 입력..."],coords:{"베를린":[52.5200,13.4050],"뮌헨":[48.1351,11.5820],"함부르크":[53.5753,10.0153],"프랑크푸르트":[50.1109,8.6821]}},
  "호주 🇦🇺":{cities:["시드니","멜버른","브리즈번","퍼스","직접 입력..."],coords:{"시드니":[-33.8688,151.2093],"멜버른":[-37.8136,144.9631],"브리즈번":[-27.4698,153.0251],"퍼스":[-31.9505,115.8605]}},
  "중국 🇨🇳":{cities:["베이징","상하이","청두","광저우","직접 입력..."],coords:{"베이징":[39.9042,116.4074],"상하이":[31.2304,121.4737],"청두":[30.5728,104.0668],"광저우":[23.1291,113.2644]}},
  "태국 🇹🇭":{cities:["방콕","치앙마이","푸켓","직접 입력..."],coords:{"방콕":[13.7563,100.5018],"치앙마이":[18.7883,98.9853],"푸켓":[7.8804,98.3923]}},
};
const WL={0:"맑음",1:"대체로 맑음",2:"구름조금",3:"흐림",45:"안개",48:"안개",51:"이슬비",53:"이슬비",55:"이슬비",61:"비",63:"비",65:"강한 비",71:"눈",73:"눈",75:"강한 눈",80:"소나기",81:"소나기",82:"강한 소나기",95:"뇌우",96:"뇌우",99:"뇌우"};
const WI={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",80:"⛈️",81:"⛈️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};
const DAYS=["일","월","화","수","목","금","토"];
let recentSearches=[];

/* 날짜 유틸 */
const todayStr=()=>new Date().toISOString().slice(0,10);
const offsetDate=(s,n)=>{const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const shiftYear=(s,n)=>s.replace(/^\d{4}/,y=>String(+y+n));
function getDates(s,e){const a=[],c=new Date(s),end=new Date(e);while(c<=end){a.push(new Date(c));c.setDate(c.getDate()+1)}return a}

/* UI 초기화 */
window.addEventListener('DOMContentLoaded',()=>{
  const t=todayStr();
  const ds=document.getElementById('dateStart'),de=document.getElementById('dateEnd');
  ds.value=t;ds.min=t;
  de.value=offsetDate(t,6);de.min=t;
  ds.addEventListener('change',function(){de.min=this.value;if(de.value<this.value)de.value=offsetDate(this.value,6)});
  document.getElementById('countrySelect').value='대한민국 🇰🇷';
  onCountryChange();
  document.getElementById('citySelect').value='파주';
});

function onCountryChange(){
  const v=document.getElementById('countrySelect').value;
  const sg=document.getElementById('citySelectGroup'),ig=document.getElementById('cityInputGroup'),cig=document.getElementById('countryInputGroup');
  const cs=document.getElementById('citySelect');
  if(v==='기타 ✏️'){sg.style.display='none';ig.style.display='flex';cig.style.display='flex'}
  else{cig.style.display='none';if(v&&CITY_DATA[v]){cs.innerHTML=CITY_DATA[v].cities.map(c=>`<option>${c}</option>`).join('');sg.style.display='flex';ig.style.display='none'}else{cs.innerHTML='<option>나라 먼저 선택</option>';sg.style.display='flex';ig.style.display='none'}}
}
function onCityChange(){
  const v=document.getElementById('citySelect').value;
  const ig=document.getElementById('cityInputGroup');
  if(v==='직접 입력...'){ig.style.display='flex';document.getElementById('cityInput').value=''}else ig.style.display='none';
}
function getSelected(){
  const country=document.getElementById('countrySelect').value;
  if(country==='기타 ✏️')return{country:document.getElementById('countryInput').value.trim()||'알 수 없음',city:document.getElementById('cityInput').value.trim()||'알 수 없음',coords:null};
  let city=document.getElementById('citySelect').value;
  if(city==='직접 입력...')city=document.getElementById('cityInput').value.trim();
  return{country:country.replace(/\s[\uD83C][\uDDE6-\uDDFF]{2}/,'').trim(),city,coords:CITY_DATA[country]?.coords[city]||null};
}

/* 상태 UI */
function setStatus(msg,type='info'){
  const el=document.getElementById('statusBar');
  if(!msg){el.style.display='none';return}
  el.className=`status-bar s-${type}`;el.style.display='flex';
  el.innerHTML=type==='info'?`<span class="spinner"></span>${msg}`:type==='ok'?`✅ ${msg}`:`⚠️ ${msg}`;
}
function setProgress(pct,label){
  const w=document.getElementById('progWrap');
  if(pct<0){w.style.display='none';return}
  w.style.display='block';
  document.getElementById('progFill').style.width=Math.min(pct,100)+'%';
  document.getElementById('progLabel').textContent=label||'';
}

/* Open-Meteo API */
const ARCHIVE='https://archive-api.open-meteo.com/v1/archive';
const FORECAST='https://api.open-meteo.com/v1/forecast';
const GEO='https://geocoding-api.open-meteo.com/v1/search';
const VARS_ARCHIVE='weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,relative_humidity_2m_mean';
const VARS_FORECAST='weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,relative_humidity_2m_mean';

async function geocode(city,country){
  const r=await fetch(`${GEO}?name=${encodeURIComponent(city+' '+country)}&count=1&language=ko`);
  const d=await r.json();
  if(d.results?.length)return[d.results[0].latitude,d.results[0].longitude];
  throw new Error(`"${city}" 위치를 찾을 수 없습니다`);
}

async function fetchWeather(lat,lon,start,end){
  const today=todayStr();
  const archiveEnd=offsetDate(today,-6);
  let rows=[];

  if(start<=archiveEnd){
    const s=start;
    const e=end<=archiveEnd?end:archiveEnd;
    const url=new URL(ARCHIVE);
    url.searchParams.set('latitude',lat);
    url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',VARS_ARCHIVE);
    url.searchParams.set('timezone','auto');
    url.searchParams.set('start_date',s);
    url.searchParams.set('end_date',e);
    const r=await fetch(url.toString());
    const d=await r.json();
    if(d.error) throw new Error(d.reason||'Archive API 오류');
    if(d.daily) rows=[...rows,...parseMeteo(d.daily)];
  }

  if(end>archiveEnd){
    const s=start>archiveEnd?start:offsetDate(archiveEnd,1);
    const e=end;
    const url=new URL(FORECAST);
    url.searchParams.set('latitude',lat);
    url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',VARS_FORECAST);
    url.searchParams.set('timezone','auto');
    url.searchParams.set('start_date',s);
    url.searchParams.set('end_date',e);
    const r=await fetch(url.toString());
    const d=await r.json();
    if(d.error) throw new Error(d.reason||'Forecast API 오류');
    if(d.daily) rows=[...rows,...parseMeteo(d.daily)];
  }

  return rows;
}

function parseMeteo(d){
  return(d.time||[]).map((date,i)=>({
    date,
    cond:WL[d.weathercode?.[i]??0]||'알 수 없음',
    icon:WI[d.weathercode?.[i]??0]||'🌡️',
    tempMax:Math.round(d.temperature_2m_max?.[i]??0),
    tempMin:Math.round(d.temperature_2m_min?.[i]??0),
    amount:+((d.precipitation_sum?.[i]||0)).toFixed(1),
    prob:Math.round(d.precipitation_probability_max?.[i]||0),
    humidity:Math.round(d.relative_humidity_2m_mean?.[i]||0),
    wind:+((d.windspeed_10m_max?.[i]||0)/3.6).toFixed(1),
  }));
}

/* 셀 HTML 생성 */
function rainBg(amt){if(!amt||amt<1)return null;if(amt<5)return'#dbeafe';if(amt<15)return'#93c5fd';return'#3b82f6'}
function makeCellHtml(row,type){
  if(!row)return`<td class="cell-empty">—</td>`;
  const rb=rainBg(row.amount),dark=rb==='#3b82f6';
  const bg=rb||(type==='official'?'#f7f7f8':type==='ai'?'#f7f7f8':'#fff');
  const t=dark?'color:#fff':'';
  return`<td class="weather-cell" style="background:${bg};${t}">
    <span class="wicon">${row.icon}</span>
    <span class="cond-txt" style="${t}">${row.cond}</span><br>
    <span class="tmin" style="${dark?'color:#bfdbfe':''}">${row.tempMin}°</span>
    <span class="sep">/</span>
    <span class="tmax" style="${dark?'color:#fecaca':''}">${row.tempMax}°</span>
    <span class="meta" style="${t}"> 강수 ${row.prob}%</span><br>
    <span class="meta">
      ${row.amount>0?`<span class="rain-lbl" style="${dark?'color:#bfdbfe':''}">🌧 ${row.amount}mm</span> `:''}
      <span class="hum" style="${dark?'color:#a5f3fc':''}">💧${row.humidity}%</span>
      <span class="wnd" style="${dark?'color:#ddd6fe':''}"> 💨${row.wind}m/s</span>
    </span>
  </td>`;
}

/* KPI 업데이트 */
function updateKPI(rows,city,country,s,e,years){
  const v=rows.filter(Boolean);if(!v.length)return;
  let sH=0,sL=0,rain=0,tot=0,sHum=0,sWind=0;
  v.forEach(r=>{sH+=r.tempMax;sL+=r.tempMin;if(r.amount>0){rain++;tot+=r.amount}sHum+=r.humidity;sWind+=r.wind});
  const n=v.length;
  document.getElementById('kpiTitle').textContent=`📍 ${city}, ${country}  ·  ${s} ~ ${e}  ·  과거 ${years}년 실제 데이터`;
  document.getElementById('kpiGrid').innerHTML=[
    {l:'평균 최고기온',v:`${(sH/n).toFixed(1)}°C`},
    {l:'평균 최저기온',v:`${(sL/n).toFixed(1)}°C`},
    {l:'강수일수',v:`${rain}일`},
    {l:'총 강수량',v:`${tot.toFixed(1)}mm`},
    {l:'평균 습도',v:`${Math.round(sHum/n)}%`},
    {l:'평균 풍속',v:`${(sWind/n).toFixed(1)}m/s`},
  ].map(k=>`<div class="kc"><div class="kc-label">${k.l}</div><div class="kc-val">${k.v}<span class="kbadge">실측</span></div></div>`).join('');
}

/* 메인 조회 — 데이터 먼저 모두 수집 후 한번에 렌더링 */
async function applyFilter(){
  const {country,city,coords}=getSelected();
  if(!city){alert('도시를 선택하거나 입력해 주세요.');return}
  const s=document.getElementById('dateStart').value;
  const e=document.getElementById('dateEnd').value;
  if(!s||!e||s>e){alert('날짜 범위를 확인해 주세요.');return}
  const years=parseInt(document.getElementById('yearSlider').value);
  const btn=document.getElementById('applyBtn');
  btn.disabled=true;btn.textContent='조회 중...';

  const key=`${country} ${city}`;
  recentSearches=[key,...recentSearches.filter(x=>x!==key)].slice(0,5);
  renderRecent();

  /* 좌표 확인 */
  let lat,lon;
  try{
    setStatus('좌표 확인 중...');setProgress(5,'');
    if(coords){[lat,lon]=coords}else{[lat,lon]=await geocode(city,country)}
  }catch(err){setStatus(err.message,'err');setProgress(-1);btn.disabled=false;btn.textContent='조회';return}

  const dates=getDates(s,e);
  const startYear=new Date(s).getFullYear();
  const yearList=Array.from({length:years},(_,i)=>startYear-years+i);

  /* 과거 실측 병렬 수집 */
  setStatus(`과거 ${years}년 실측 데이터 수집 중...`);
  let done=0;
  const histMap={};
  await Promise.all(yearList.map(async yr=>{
    const ys=s.replace(/^\d{4}/,String(yr));
    const ye=e.replace(/^\d{4}/,String(yr));
    try{
      const rows=await fetchWeather(lat,lon,ys,ye);
      histMap[yr]=rows;
    }catch{histMap[yr]=null}
    done++;
    setProgress(Math.round(done/yearList.length*75),`실측 수집 ${done}/${yearList.length}년`);
  }));

  /* 공식 예보 수집 */
  setStatus('공식 예보 수집 중...');setProgress(82,'');
  let offRows=[];
  try{
    offRows=await fetchWeather(lat,lon,s,e);
  }catch(err){
    setStatus(`예보 수집 실패: ${err.message}`,'err');
  }

  /* 전체 테이블 한번에 렌더링 */
  setProgress(95,'테이블 렌더링 중...');

  /* 헤더 */
  document.getElementById('matrixHead').innerHTML=`<tr>
    <th rowspan="2" class="ch-h" style="min-width:84px">날짜</th>
    <th colspan="${years}" class="ch-h"><span class="sbadge sb-h">과거 실측 ${yearList[0]}–${yearList[years-1]}</span></th>
    <th class="ch-o"><span class="sbadge sb-o">🔵 공식 예보</span></th>
    <th class="ch-a"><span class="sbadge sb-a">🟣 AI 예측</span></th>
  </tr><tr>
    ${yearList.map(y=>`<th class="ch-h" style="min-width:118px">${y}년</th>`).join('')}
    <th class="ch-o" style="min-width:130px">Open-Meteo</th>
    <th class="ch-a" style="min-width:140px">Claude (추후 연동)</th>
  </tr>`;

  /* 바디 — 전체 데이터 갖춰진 후 한번에 innerHTML */
  document.getElementById('matrixBody').innerHTML=dates.map((dt,i)=>{
    const mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');
    const wknd=dt.getDay()===0||dt.getDay()===6;
    const histCells=yearList.map(yr=>{
      const rows=histMap[yr];
      if(!rows)return`<td class="cell-fail">${yr}년 실패</td>`;
      return makeCellHtml(rows[i]||null,'hist');
    }).join('');
    const offCell=offRows.length?makeCellHtml(offRows[i]||null,'official'):`<td class="cell-fail">예보 실패</td>`;
    return`<tr>
      <td style="background:#fff;position:sticky;left:0;z-index:5">
        <span style="font-size:12px;font-weight:600;color:${wknd?'#e53e3e':'#1d1d1f'}">${mm}/${dd}</span><br>
        <span style="font-size:10px;color:#8e8e93">${DAYS[dt.getDay()]}요일</span>
      </td>
      ${histCells}
      ${offCell}
      <td class="cell-ai">추후 연동</td>
    </tr>`;
  }).join('');

  if(offRows.length)updateKPI(offRows,city,country,s,e,years);
  setStatus(`조회 완료 — ${city} ${s} ~ ${e}`,'ok');
  setProgress(-1);
  btn.disabled=false;btn.textContent='조회';
  setTimeout(()=>setStatus(''),4000);
}

function renderRecent(){
  const el=document.getElementById('recentRow');
  el.innerHTML=recentSearches.length
    ?`<span style="font-size:11px;color:#8e8e93">최근:</span>`
    +recentSearches.map(r=>`<span class="rtag" onclick="loadRecent('${r}')">${r}</span>`).join(''):'';
}
function loadRecent(key){
  const p=key.trim().split(/\s+/);
  document.getElementById('cityInput').value=p[p.length-1];
  document.getElementById('cityInputGroup').style.display='flex';
  document.getElementById('citySelectGroup').style.display='none';
  applyFilter();
}
</script>
