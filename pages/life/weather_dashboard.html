<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 날씨 예측 대시보드</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#000;color:#fff;font-size:13px;line-height:1.5}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#313131;border-radius:0}
.filter-panel{background:#181818;padding:14px 20px 0;position:sticky;top:44px;z-index:100}
.ver-badge{font-size:10px;font-weight:600;color:#7D7D7D;background:#202020;border:1px solid #313131;border-radius:0;padding:2px 7px;flex-shrink:0;margin-left:auto}
.filter-summary{display:flex;align-items:center;cursor:pointer;gap:8px;user-select:none;-webkit-user-select:none;min-height:20px}
.filter-summary:hover .f-hamburger{border-color:#FFC000;color:#FFC000}
.f-title{font-size:12px;font-weight:600;color:#7D7D7D;letter-spacing:.08em;text-transform:uppercase}
.f-detail{font-size:12px;color:#fff;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.f-hamburger{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #313131;color:#7D7D7D;flex-shrink:0;transition:border-color .15s,color .15s;font-size:15px;line-height:1;background:none;cursor:pointer;padding:0;font-family:inherit}
.f-hamburger.open{border-color:#FFC000;color:#FFC000}
.query-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 20px 12px;margin:8px -20px 0;border-top:1px solid #313131}
.query-bar .btn-primary{margin-left:auto;flex-shrink:0;height:34px;padding:0 20px;font-size:12px;white-space:nowrap}
.qchip-empty{background:#181818;border-color:#313131;color:#494949}
.qchip-mode{background:#1a0d2e;border-color:#4c1d95;color:#c4b5fd}
.query-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;min-height:26px}
.qchip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;font-size:12px;font-weight:500;border:1px solid #313131;white-space:nowrap}
.qchip-loc{background:#1a1400;border-color:#4a3800;color:#FFC000}
.qchip-date{background:#0f172a;border-color:#1e3a5f;color:#93c5fd}
.qchip-years{background:#052e16;border-color:#14532d;color:#4ade80}
.filter-content{overflow:hidden;max-height:800px;transition:max-height .35s cubic-bezier(.4,0,.2,1);padding-top:10px}
.filter-content.collapsed{max-height:0;transition:max-height .25s cubic-bezier(.4,0,.2,1)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.flabel{font-size:11px;font-weight:500;color:#7D7D7D}
select,input[type=text],input[type=date],input[type=password]{height:34px;border:1px solid #313131;border-radius:0;padding:0 10px;font-size:12px;font-family:inherit;color:#fff;background:#202020;outline:none;transition:border-color .15s}
select:focus,input:focus{border-color:#FFC000;box-shadow:none}
.slider-row{display:flex;align-items:center;gap:8px}
input[type=range]{-webkit-appearance:none;width:100px;height:4px;background:#313131;border-radius:0;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:0;background:#FFC000;border:2px solid #000;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.sval{font-size:12px;font-weight:600;color:#FFC000;min-width:26px}
.btn{height:34px;padding:0 14px;border:none;border-radius:0;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#FFC000;color:#000}
.btn-green{background:#052e16;color:#4ade80;border:1px solid #14532d}
.btn-gray{background:#202020;color:#7D7D7D;border:1px solid #313131}
.panel-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mode-row{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.mode-label{font-size:12px;color:#fff;display:flex;align-items:center;gap:5px;cursor:pointer}
.api-row{display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
.loc-search-wrap{position:relative;flex:1;min-width:160px;max-width:280px}
.loc-results{display:none;position:absolute;top:57px;left:0;z-index:300;background:#202020;border:1px solid #FFC000;min-width:280px;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.7)}
.loc-result{padding:8px 12px;cursor:pointer;border-bottom:1px solid #313131;transition:background .1s}
.loc-result:hover{background:#2a2a2a}
.loc-result:last-child{border-bottom:none}
#locInfoBar{display:none;margin-top:8px;padding:6px 10px;background:#202020;border:1px solid #313131;align-items:center;gap:10px;flex-wrap:wrap}
.fav-row{display:none;gap:5px;flex-wrap:wrap;margin-top:10px;align-items:center}
.slider-row{display:flex;align-items:center;gap:8px;height:34px}
.fav-tag{font-size:11px;padding:3px 8px;background:#1a1400;border:1px solid #4a3800;border-radius:0;cursor:pointer;color:#FFC000;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.fav-tag:hover{background:#252000;border-color:#FFC000}
.fav-tag.fav-active{background:#FFC000;color:#000;border-color:#FFC000}
.fav-tag.fav-active .fav-del{color:#000}
.fav-del{font-size:14px;line-height:1;opacity:.55;margin-left:1px;flex-shrink:0}
.fav-del:hover{opacity:1}
.kpi-bar{background:#181818;padding:14px 20px}
.kpi-title{font-size:15px;font-weight:600;margin-bottom:10px;color:#fff}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.kc{background:#202020;border-left:2px solid #313131;padding:10px 12px}
.kc-label{font-size:11px;color:#7D7D7D;text-transform:uppercase;margin-bottom:3px}
.kc-val{font-size:18px;font-weight:600;line-height:1.2;color:#fff}
.kbadge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:0;margin-left:3px;vertical-align:middle;background:#052e16;color:#4ade80}
.sbar{padding:9px 20px;font-size:12px;display:none;align-items:center;gap:8px}
.sbar-info{background:#0f172a;color:#93c5fd;border-bottom:1px solid #1e3a5f}
.sbar-err{background:#1a0505;color:#f87171;border-bottom:1px solid #7f1d1d}
.sbar-ok{background:#052e16;color:#4ade80;border-bottom:1px solid #14532d}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #313131;border-top-color:#FFC000;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{padding:4px 20px 8px;display:none;background:#181818;border-bottom:1px solid #313131}
.prog-track{height:3px;background:#313131;border-radius:0;overflow:hidden}
.prog-fill{height:100%;background:#FFC000;border-radius:0;transition:width .4s}
.prog-label{font-size:11px;color:#7D7D7D;margin-top:4px}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 20px 12px;background:#181818}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#7D7D7D}
.ld{width:10px;height:10px;border-radius:0;flex-shrink:0}
.matrix-wrap{overflow-x:auto;padding:0 0 24px}
table{border-collapse:collapse;width:max-content;min-width:100%}
th,td{padding:6px 8px;border:1px solid #313131;vertical-align:top}
thead th{background:#181818;font-size:10px;font-weight:600;color:#7D7D7D;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:10}
th:first-child,td:first-child{position:sticky;left:0;z-index:5;background:#181818;min-width:72px}
thead th:first-child{z-index:20;background:#181818}
.ch-h{background:#181818!important;text-align:center;border-bottom:2px solid #313131!important;color:#7D7D7D!important}
.ch-o{background:#0d1b2a!important;text-align:center;border-bottom:2px solid #1e3a5f!important;color:#93c5fd!important}
.ch-a{background:#1a0d2e!important;text-align:center;border-bottom:2px solid #3b1f6e!important;color:#c4b5fd!important}
.sbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:0}
.sb-h{background:#202020;color:#7D7D7D}
.sb-o{background:#0d1b2a;color:#93c5fd}
.sb-a{background:#1a0d2e;color:#c4b5fd}
.weather-cell{min-width:130px;font-size:11px;padding:6px 8px!important;background:#181818}
.ampm-wrap{display:flex;gap:5px;margin-bottom:4px}
.slot{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 2px;border-radius:0}
.slot-am{background:rgba(251,191,36,.07)}
.slot-pm{background:rgba(59,130,246,.07)}
.slot-lbl{font-size:8px;font-weight:600;color:#494949}
.slot-icon{font-size:16px;line-height:1.2}
.slot-cond{font-size:9px;color:#9ca3af;white-space:nowrap}
.slot-hum{font-size:9px;color:#67e8f9;font-weight:500}
.slot-rain{font-size:9px;font-weight:600;color:#93c5fd}
.slot-divider{width:1px;background:#313131;align-self:stretch}
.temp-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:2px}
.tmin{font-size:12px;font-weight:600;color:#60a5fa}
.tmax{font-size:12px;font-weight:600;color:#f87171}
.cell-fail{text-align:center;color:#f87171;font-size:11px;padding:18px 8px;background:#1a0505;min-width:130px}
.cell-ai-wait{text-align:center;padding:18px 8px;background:#1a0d2e;font-size:11px;color:#c4b5fd;min-width:140px}
.conf-badge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:0;display:inline-block;margin-top:2px}
.cb-h{background:#052e16;color:#4ade80}
.cb-m{background:#422006;color:#fbbf24}
.cb-l{background:#1a0505;color:#f87171}
.reason{font-size:10px;color:#7D7D7D;display:block;margin-top:2px;max-width:130px;white-space:normal;line-height:1.3}
.chart-panel{background:#181818;border-top:1px solid #202020;padding:20px 20px 8px}
.chart-section{margin-bottom:28px}
.chart-title{font-size:12px;font-weight:600;color:#7D7D7D;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#7D7D7D;cursor:pointer;transition:opacity .2s}
.cl-item:hover{opacity:.75}
.cl-dot{width:24px;height:3px;border-radius:0}
.cl-dash{width:24px;height:0;border-top:2px dashed}
.sel-mode-btn{font-size:11px;height:26px;padding:0 10px}
.sel-mode-btn.active{background:#1a1400;border-color:#FFC000;color:#FFC000}
.sel-off{opacity:.15}
.vault-nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:44px;background:#000;border-bottom:1px solid #202020;font-family:'Inter',Roboto,'Helvetica Neue',Arial,sans-serif;}
.vault-logo{font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;text-decoration:none;display:flex;align-items:center;}
.vault-logo span{color:#FFC000}
.vault-nav-btns{display:flex;align-items:center}
.vbtn{padding:0 16px;height:44px;border:none;background:none;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:.12em;text-transform:uppercase;color:#7D7D7D;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:color .15s;}
.vbtn:hover{color:#FFC000}
.vsep{width:1px;height:16px;background:#202020;flex-shrink:0}
@media(max-width:768px){.filter-row{gap:5px}.filter-row input[type=text],.filter-row input[type=date],.filter-row input[type=password]{width:auto;min-width:80px}}
@media(max-width:600px){.vault-nav{padding:0 20px;height:40px}.vbtn{padding:0 10px;height:40px;font-size:9px}.vault-logo{font-size:13px}.filter-panel{padding:10px 12px 0}.kpi-grid{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}.loc-results{min-width:220px}.query-bar{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}}
</style>
</head>
<body>

<nav class="vault-nav">
  <a class="vault-logo" href="https://dielk1618.github.io/html-vault/index.html">HTML <span>VAULT</span></a>
  <div class="vault-nav-btns">
    <a class="vbtn" href="https://dielk1618.github.io/html-vault/index.html">HOME</a>
    <div class="vsep"></div>
    <button class="vbtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">TOP</button>
    <div class="vsep"></div>
    <button class="vbtn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">BOTTOM</button>
  </div>
</nav>

<div class="filter-panel">
  <div class="filter-summary" id="filterSummary" onclick="toggleFilter()">
    <button class="f-hamburger open" id="fToggle">✕</button>
    <span class="f-title">날씨 조회 설정</span>
    <span class="ver-badge">v6.4</span>
  </div>
  <div class="filter-content" id="filterContent">
  <div class="filter-row">
    <div class="fg loc-search-wrap">
      <span class="flabel">지역 검색</span>
      <div style="display:flex;gap:5px">
        <input type="text" id="locationSearch" placeholder="지역명 검색 (예: 분당구, 파주, Tokyo)" style="flex:1"
          onkeydown="if(event.key==='Enter')searchLocation()"
          oninput="onLocInput(this.value)">
        <button class="btn btn-gray" onclick="searchLocation()" style="padding:0 12px;flex-shrink:0">🔍</button>
      </div>
      <div class="loc-results" id="locResults"></div>
    </div>
    <div class="fg">
      <span class="flabel">조회 기간</span>
      <div style="display:flex;align-items:center;height:34px;gap:0">
        <input type="date" id="dateStart" style="width:120px;border-right:none">
        <span style="height:34px;padding:0 6px;background:#202020;border-top:1px solid #313131;border-bottom:1px solid #313131;display:flex;align-items:center;font-size:11px;color:#494949;flex-shrink:0">—</span>
        <input type="date" id="dateEnd" style="width:120px;border-left:none">
      </div>
    </div>
    <div class="fg">
      <span class="flabel">과거 데이터</span>
      <div class="slider-row">
        <input type="range" id="yearSlider" min="1" max="10" value="5" step="1"
          oninput="document.getElementById('yearVal').textContent=this.value+'년';saveSettings();updateQueryBar()">
        <span class="sval" id="yearVal">5년</span>
      </div>
    </div>
  </div>

  <div id="locInfoBar"></div>
  <div class="fav-row" id="favRow"></div>

  <div class="mode-row">
    <span class="flabel">AI 예측 방식</span>
    <label class="mode-label">
      <input type="radio" name="aiMode" value="stats" checked id="modeStats"> 📊 통계 예측 <span style="font-size:10px;color:#7D7D7D">(무료)</span>
    </label>
    <label class="mode-label">
      <input type="radio" name="aiMode" value="api" id="modeApi"> 🤖 AI API <span style="font-size:10px;color:#7D7D7D">(크레딧 필요)</span>
    </label>
    <span id="modeDesc" style="font-size:11px;color:#7D7D7D">과거 N년 평균 + 기후 트렌드 보정으로 예측합니다</span>
  </div>

  <div class="api-row" id="apiRow">
    <span class="flabel">제공사</span>
    <select id="apiProvider" style="width:120px" onchange="onProviderChange()">
      <option value="claude">🤖 Claude</option>
      <option value="gemini">✨ Gemini</option>
    </select>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api..." style="flex:1;max-width:320px;font-family:monospace;font-size:11px">
    <button class="btn btn-green" onclick="saveApiKey()">🔒 저장</button>
    <button class="btn btn-gray" onclick="clearApiKey()">🗑️ 삭제</button>
    <span id="apiSaveStatus" style="font-size:11px;color:#7D7D7D"></span>
  </div>
  </div><!-- /filter-content -->
  <div class="query-bar">
    <span class="qchip qchip-empty" id="qcLoc">📍 지역 미선택</span>
    <span class="qchip qchip-date" id="qcDate">📅 —</span>
    <span class="qchip qchip-years" id="qcYears">📊 과거 5년</span>
    <span class="qchip qchip-mode" id="qcMode">📊 통계</span>
    <button class="btn btn-primary" id="applyBtn" onclick="applyFilter()">조회</button>
  </div>
</div>

<div id="sbar" class="sbar"></div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel"></div>
</div>

<div class="kpi-bar">
  <div class="kpi-grid" id="kpiGrid">
    <div class="kc"><div class="kc-label">평균 최고기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 최저기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">강수일수</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">총 강수량</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 습도</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 풍속</div><div class="kc-val">—</div></div>
  </div>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#fef3c7;border:1px solid #fcd34d"></div>오전</div>
  <div class="li"><div class="ld" style="background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.5)"></div>오후</div>
  <div class="li"><div class="ld" style="background:#181818;border:1px solid #494949"></div>과거 실측</div>
  <div class="li"><div class="ld" style="background:#0d1b2a;border:1px solid #93c5fd"></div>공식 예보</div>
  <div class="li"><div class="ld" style="background:#1a0d2e;border:1px solid #a78bfa"></div>AI 예측</div>
  <div class="li"><div class="ld" style="background:#0a1c33;border:1px solid #1e3a5f"></div>약한 비 1–5mm</div>
  <div class="li"><div class="ld" style="background:#0b2847;border:1px solid #1e4a7a"></div>보통 비 5–15mm</div>
  <div class="li"><div class="ld" style="background:#0d3464;border:1px solid #1e4d8c"></div>강한 비 15mm+</div>
</div>

<div class="matrix-wrap">
  <table><thead id="matrixHead"></thead><tbody id="matrixBody"></tbody></table>
</div>

<div class="chart-panel" id="chartPanel" style="display:none">
  <div class="chart-section">
    <div class="chart-title">기온 캔들차트 — 일최저~최고 기온 범위 (범주 클릭으로 토글)</div>
    <div class="chart-legend" id="tempLegend"></div>
    <div style="position:relative;width:100%;height:260px"><canvas id="tempChart"></canvas></div>
  </div>
  <div class="chart-section">
    <div class="chart-title">강수량 — 일별 총 강수량 (mm)</div>
    <div class="chart-legend" id="rainLegend"></div>
    <div style="position:relative;width:100%;height:200px"><canvas id="rainChart"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const WL={0:"맑음",1:"대체로맑음",2:"구름조금",3:"흐림",45:"안개",48:"안개",51:"이슬비",53:"이슬비",55:"이슬비",61:"비",63:"비",65:"강한비",71:"눈",73:"눈",75:"강한눈",80:"소나기",81:"소나기",82:"강한소나기",95:"뇌우",96:"뇌우",99:"뇌우"};
const WI={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",80:"⛈️",81:"⛈️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};

const offsetDate=(s,n)=>{const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
function getDates(s,e){const a=[],c=new Date(s),end=new Date(e);while(c<=end){a.push(new Date(c));c.setDate(c.getDate()+1)}return a}
const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;

function slotCond(rain,cloud){
  if(rain>=15)return"강한비";if(rain>=5)return"비";if(rain>=1)return"소나기";
  if(cloud>=75)return"흐림";if(cloud>=40)return"구름많음";return"맑음";
}

function fmtNominatim(item){
  const a=item.address||{};
  const country=a.country||'';
  const parts=[
    a.state||a.region||'',
    a.city||a.county||a.municipality||a.town||'',
    a.suburb||a.city_district||a.district||'',
    a.neighbourhood||a.quarter||a.village||a.hamlet||''
  ].filter(Boolean).filter(function(v,i,arr){return arr.indexOf(v)===i;});
  return{displayName:parts.join(' ')||item.display_name.split(',')[0].trim(),country:country};
}

async function searchLocation(){
  const q=document.getElementById('locationSearch').value.trim();
  if(!q){closeLocResults();return;}
  const res=document.getElementById('locResults');
  res.style.display='block';
  res.innerHTML='<div style="padding:8px 12px;color:#7D7D7D;font-size:12px">검색 중...</div>';
  try{
    const r=await fetch(GEO+'?q='+encodeURIComponent(q)+'&format=json&limit=8&accept-language=ko&addressdetails=1');
    const d=await r.json();
    if(!Array.isArray(d)||!d.length){
      res.innerHTML='<div style="padding:8px 12px;color:#f87171;font-size:12px">검색 결과 없음</div>';
      return;
    }
    _geoResults=d;
    res.innerHTML=d.map(function(item,idx){
      const f=fmtNominatim(item);
      return'<div class="loc-result" onclick="selectLocation('+idx+')">'
        +'<span style="font-size:12px;color:#fff">'+f.displayName+'</span>'
        +' <span style="font-size:10px;color:#7D7D7D">'+f.country+'</span>'
        +'</div>';
    }).join('');
  }catch(e){
    res.innerHTML='<div style="padding:8px 12px;color:#f87171;font-size:12px">검색 오류: '+e.message+'</div>';
  }
}

function closeLocResults(){
  document.getElementById('locResults').style.display='none';

  const idx=favorites.findIndex(function(f){return f.displayName===currentLocation.displayName;});
  if(idx>=0) favorites.splice(idx,1);
  else favorites.push(Object.assign({},currentLocation));

  renderLocSelected();
  renderFavRow();

/* Gemini 자동 폴백 — 폐기·없는 모델은 건너뛰고 다음 시도 */
const GEMINI_MODELS=['gemini-2.5-flash-lite','gemini-2.0-flash-001','gemini-2.5-flash'];
function isModelUnavailable(msg){
  return /not found|no longer available|deprecated|not available|does not exist|not supported/i.test(msg);
}
async function callGemini(apiKey,prompt){
  let lastErr=new Error('사용 가능한 Gemini 모델이 없습니다');
  for(const model of GEMINI_MODELS){
    try{
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey,{
        method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:.3,maxOutputTokens:8192}})
      });
      const d=await res.json();
      if(!res.ok){
        const msg=(d.error&&d.error.message)||'HTTP '+res.status;
        if(isModelUnavailable(msg)){lastErr=new Error('['+model+'] '+msg);continue;}
        throw new Error(msg);
      }
      if(d.error){
        if(isModelUnavailable(d.error.message)){lastErr=new Error(d.error.message);continue;}
        throw new Error(d.error.message);
      }
      if(!d.candidates||!d.candidates.length) throw new Error('Gemini 응답 없음 (안전 필터 또는 할당량 초과)');
      const cand=d.candidates[0];
      if(!cand.content||!cand.content.parts||!cand.content.parts.length) throw new Error('Gemini 응답 내용 없음');
      let txt=cand.content.parts[0].text;
      if(cand.finishReason==='MAX_TOKENS'){
        const s=txt.indexOf('['),lb=txt.lastIndexOf('}');
        if(s!==-1&&lb!==-1) txt=txt.slice(s,lb+1)+']';
        else throw new Error('응답이 잘렸습니다 (MAX_TOKENS). 기간을 줄여보세요.');
      } else if(cand.finishReason&&cand.finishReason!=='STOP'){
        throw new Error('응답 차단됨 ('+cand.finishReason+')');
      }
      return{text:txt,model:model};
    }catch(e){
      if(isModelUnavailable(e.message)){lastErr=e;continue;}
      throw e;
    }
  }
  throw lastErr;
}

/* ── Open-Meteo API ── */
async function fetchWeather(lat,lon,start,end){
  const today=todayStr();
  const archiveEnd=offsetDate(today,-6);
  let daily=[],hourlyMap={};
  if(start<=archiveEnd){
    const s=start,e=end<=archiveEnd?end:archiveEnd;
    const url=new URL(ARCHIVE);
    url.searchParams.set('latitude',lat); url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',DVARS); url.searchParams.set('hourly',HVARS);
    url.searchParams.set('timezone','auto'); url.searchParams.set('start_date',s); url.searchParams.set('end_date',e);
    const r=await fetch(url.toString()); const d=await r.json();
    if(d.error) throw new Error(d.reason||'Archive 오류');
    if(d.daily) daily=daily.concat(parseDaily(d.daily));
    if(d.hourly) mergeHourly(hourlyMap,d.hourly);
  }
  if(end>archiveEnd){
    const s=start>archiveEnd?start:offsetDate(archiveEnd,1),e=end;
    const url=new URL(FORECAST);
    url.searchParams.set('latitude',lat); url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',DVARS); url.searchParams.set('hourly',HVARS);
    url.searchParams.set('timezone','auto'); url.searchParams.set('start_date',s); url.searchParams.set('end_date',e);
    const r=await fetch(url.toString()); const d=await r.json();
    if(d.error) throw new Error(d.reason||'Forecast 오류');
    if(d.daily) daily=daily.concat(parseDaily(d.daily));
    if(d.hourly) mergeHourly(hourlyMap,d.hourly);
  }
  daily.forEach(function(row){
    const h=hourlyMap[row.date];
    if(!h) return;
    const pick=function(arr,idx){return idx.map(function(i){return arr[i];}).filter(function(v){return v!=null;});};
    const amIdx=[6,7,8,9,10,11], pmIdx=[12,13,14,15,16,17,18];
    row.amTempMax=Math.round(Math.max.apply(null,pick(h.temp,amIdx)));
    row.amHumidity=Math.round(avg(pick(h.hum,amIdx)));
    row.amRain=+sum(pick(h.precip,amIdx)).toFixed(1);
    row.amCond=slotCond(row.amRain,avg(pick(h.cloud,amIdx)));
    row.pmTempMax=Math.round(Math.max.apply(null,pick(h.temp,pmIdx)));
    row.pmHumidity=Math.round(avg(pick(h.hum,pmIdx)));
    row.pmRain=+sum(pick(h.precip,pmIdx)).toFixed(1);
    row.pmCond=slotCond(row.pmRain,avg(pick(h.cloud,pmIdx)));
  });
  return daily;
}

function mergeHourly(map,h){
  (h.time||[]).forEach(function(t,i){
    const date=t.slice(0,10),hr=parseInt(t.slice(11,13));
    if(!map[date]) map[date]={temp:[],hum:[],precip:[],cloud:[]};
    map[date].temp[hr]=h.temperature_2m[i];
    map[date].hum[hr]=h.relative_humidity_2m[i];
    map[date].precip[hr]=h.precipitation[i]||0;
    map[date].cloud[hr]=h.cloud_cover[i]||0;
  });
}

function parseDaily(d){
  return(d.time||[]).map(function(date,i){
    return{
      date:date,
      cond:WL[d.weathercode[i]]||'알 수 없음',
      icon:WI[d.weathercode[i]]||'🌡️',
      tempMax:Math.round(d.temperature_2m_max[i]||0),
      tempMin:Math.round(d.temperature_2m_min[i]||0),
      amount:+((d.precipitation_sum[i]||0)).toFixed(1),
      prob:Math.round(d.precipitation_probability_max[i]||0),
      humidity:Math.round(d.relative_humidity_2m_mean[i]||0),
      wind:+((d.windspeed_10m_max[i]||0)/3.6).toFixed(1),
      amTempMax:null,amHumidity:null,amRain:null,amCond:null,
      pmTempMax:null,pmHumidity:null,pmRain:null,pmCond:null,
    };
  });
}

/* ── 셀 렌더 ── */
function rainBg(a){if(!a||a<1)return null;if(a<5)return'#0a1c33';if(a<15)return'#0b2847';return'#0d3464';}

function makeCellHtml(row,type){
  if(!row) return '<td class="cell-fail">—</td>';
  const rb=rainBg(row.amount),dark=!!rb;
  const bg=rb||(type==='official'?'#0d1b2a':type==='ai'?'#1a0d2e':'#181818');
  const tc=dark?'color:#fff':'';
  const amC=row.amCond||row.cond,pmC=row.pmCond||row.cond;
  const arb=rainBg(row.amRain),prb=rainBg(row.pmRain);
  const amStyle=arb?'background:'+arb+';border-radius:4px':'';
  const pmStyle=prb?'background:'+prb+';border-radius:4px':'';
  const aht=arb?'color:#a5f3fc':'',art=arb?'color:#bfdbfe':'';
  const pht=prb?'color:#a5f3fc':'',prt=prb?'color:#bfdbfe':'';
  const amRainHtml=(row.amRain&&row.amRain>0)?'<span class="slot-rain" style="'+art+'">🌧 '+row.amRain+'mm</span>':'';
  const pmRainHtml=(row.pmRain&&row.pmRain>0)?'<span class="slot-rain" style="'+prt+'">🌧 '+row.pmRain+'mm</span>':'';
  let confHtml='';
  if(type==='ai'){
    const cc=row.confidence>=85?'cb-h':row.confidence>=75?'cb-m':'cb-l';
    confHtml='<br><span class="conf-badge '+cc+'">'+row.confidence+'% 신뢰</span><span class="reason">'+row.reasoning+'</span>';
  }
  return'<td class="weather-cell" style="background:'+bg+';'+tc+'">'
    +'<div class="ampm-wrap">'
      +'<div class="slot slot-am" style="'+amStyle+'">'
        +'<span class="slot-lbl">오전</span>'
        +'<span class="slot-icon">'+slotIcon(amC)+'</span>'
        +'<span class="slot-cond">'+amC+'</span>'
        +'<span class="slot-hum" style="'+aht+'">💧'+(row.amHumidity||row.humidity)+'%</span>'
        +amRainHtml
      +'</div>'
      +'<div class="slot-divider"></div>'
      +'<div class="slot slot-pm" style="'+pmStyle+'">'
        +'<span class="slot-lbl">오후</span>'
        +'<span class="slot-icon">'+slotIcon(pmC)+'</span>'
        +'<span class="slot-cond">'+pmC+'</span>'
        +'<span class="slot-hum" style="'+pht+'">💧'+(row.pmHumidity||row.humidity)+'%</span>'
        +pmRainHtml
      +'</div>'
    +'</div>'
    +'<div class="temp-row">'
      +'<span class="tmin" style="'+(dark?'color:#bfdbfe':'')+'">'+row.tempMin+'°</span>'
      +'<span style="color:#494949;margin:0 2px">/</span>'
      +'<span class="tmax" style="'+(dark?'color:#fecaca':'')+'">'+row.tempMax+'°</span>'
      +'<span style="font-size:10px;color:'+(dark?'#e0e7ff':'#7D7D7D')+';margin-left:3px">'+row.prob+'%</span>'
    +'</div>'
    +'<div style="font-size:10px;color:'+(dark?'#e0e7ff':'#7D7D7D')+';text-align:center;margin-top:1px">'
      +(row.amount>0?'<span style="color:'+(dark?'#bfdbfe':'#93c5fd')+';font-weight:600">🌧 '+row.amount+'mm</span> ':'')
      +'💨'+row.wind+'m/s'
    +'</div>'
    +confHtml
  +'</td>';
}

/* ── KPI ── */
function updateKPI(rows,city,country,s,e,years){
  const v=rows.filter(Boolean);
  if(!v.length) return;
  let sH=0,sL=0,rain=0,tot=0,sHum=0,sWind=0;
  v.forEach(function(r){sH+=r.tempMax;sL+=r.tempMin;if(r.amount>0){rain++;tot+=r.amount;}sHum+=r.humidity;sWind+=r.wind;});
  const n=v.length;
  document.getElementById('kpiGrid').innerHTML=[
    {l:'평균 최고기온',v:(sH/n).toFixed(1)+'°C'},
    {l:'평균 최저기온',v:(sL/n).toFixed(1)+'°C'},
    {l:'강수일수',v:rain+'일'},
    {l:'총 강수량',v:tot.toFixed(1)+'mm'},
    {l:'평균 습도',v:Math.round(sHum/n)+'%'},
    {l:'평균 풍속',v:(sWind/n).toFixed(1)+'m/s'},
  ].map(function(k){return'<div class="kc"><div class="kc-label">'+k.l+'</div><div class="kc-val">'+k.v+'<span class="kbadge">실측</span></div></div>';}).join('');
}

/* ── 통계 예측 ── */
function calcStats(histMap,yearList,dates){
  return dates.map(function(dt,i){
    const validRows=yearList.map(function(yr){return histMap[yr]&&histMap[yr][i]?histMap[yr][i]:null;}).filter(Boolean);
    if(!validRows.length) return null;
    const n=validRows.length;
    const wSum=validRows.reduce(function(s,_,wi){return s+(wi+1);},0);
    const wMean=function(fn){return validRows.reduce(function(s,r,wi){return s+fn(r)*(wi+1);},0)/wSum;};
    const mean=function(fn){return validRows.reduce(function(s,r){return s+fn(r);},0)/n;};
    const tempMax=Math.round(wMean(function(r){return r.tempMax;})+1.0);
    const tempMin=Math.round(wMean(function(r){return r.tempMin;})+0.6);
    const amount=+wMean(function(r){return r.amount;}).toFixed(1);
    const prob=Math.round(wMean(function(r){return r.prob;}));
    const humidity=Math.round(mean(function(r){return r.humidity;}));
    const wind=+mean(function(r){return r.wind;}).toFixed(1);
    const amTempMax=validRows.some(function(r){return r.amTempMax!=null;})?Math.round(wMean(function(r){return r.amTempMax!=null?r.amTempMax:r.tempMax;})+1.0):tempMax;
    const pmTempMax=validRows.some(function(r){return r.pmTempMax!=null;})?Math.round(wMean(function(r){return r.pmTempMax!=null?r.pmTempMax:r.tempMax;})+1.0):tempMax;
    const amHumidity=Math.round(mean(function(r){return r.amHumidity!=null?r.amHumidity:r.humidity;}));
    const pmHumidity=Math.round(mean(function(r){return r.pmHumidity!=null?r.pmHumidity:r.humidity;}));
    const amRain=+wMean(function(r){return r.amRain!=null?r.amRain:0;}).toFixed(1);
    const pmRain=+wMean(function(r){return r.pmRain!=null?r.pmRain:0;}).toFixed(1);
    const condCounts={};
    validRows.forEach(function(r){condCounts[r.cond]=(condCounts[r.cond]||0)+1;});
    const cond=Object.entries(condCounts).sort(function(a,b){return b[1]-a[1];})[0][0];
    return{
      date:dt.toISOString().slice(0,10),cond:cond,icon:slotIcon(cond),
      tempMin:tempMin,tempMax:tempMax,amTempMax:amTempMax,pmTempMax:pmTempMax,
      amHumidity:amHumidity,pmHumidity:pmHumidity,amRain:amRain,pmRain:pmRain,
      amCond:slotCond(amRain,50),pmCond:slotCond(pmRain,50),
      amount:amount,prob:prob,humidity:humidity,wind:wind,
      confidence:72,reasoning:'과거 '+n+'년 가중평균 + 온난화 보정 (+1.0°C/+0.6°C)',
    };
  });
}

/* ── 차트 ── */
function withAlpha(c,a){
  if(c.startsWith('rgba'))return c.replace(/[\d.]+\)$/,a+')');
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+a+')';
}
function toggleItem(key){
  if(_activeItems.size===_allItems.size){
    _activeItems=new Set([key]);
  } else if(_activeItems.size===1&&_activeItems.has(key)){
    _activeItems=new Set(_allItems);
  } else {
    if(_activeItems.has(key))_activeItems.delete(key);
    else _activeItems.add(key);
  }
  applySelection();
}
function applySelection(){
  if(!tempChart||!rainChart)return;
  const allOn=_activeItems.size===_allItems.size;
  tempChart.data.datasets.forEach(function(ds,i){
    const key=ds._yr!==null?ds._yr:'forecast';
    const on=allOn||_activeItems.has(key);
    ds.borderColor=on?_tColors[i]:withAlpha(_tColors[i],.08);
    ds.borderWidth=on?_tWidths[i]:.5;
    ds.backgroundColor=on?(ds._bodyBg||withAlpha(_tColors[i],.45)):withAlpha(_tColors[i],.04);
  });
  rainChart.data.datasets.forEach(function(ds,i){
    const key=ds._yr!==null?ds._yr:'forecast';
    const on=allOn||_activeItems.has(key);
    ds.backgroundColor=on?_rColors[i]:withAlpha(_rColors[i],.08);
  });
  tempChart.update();rainChart.update();
  document.querySelectorAll('[data-yr]').forEach(function(el){
    const k=/^\d+$/.test(el.dataset.yr)?parseInt(el.dataset.yr):el.dataset.yr;
    el.classList.toggle('sel-off',allOn?false:!_activeItems.has(k));
  });
}
function renderCharts(yearList,histMap,offRows,dates){
  document.getElementById('chartPanel').style.display='block';
  _tColors=[];_tWidths=[];_rColors=[];
  _activeItems=new Set();_allItems=new Set();
  const labels=dates.map(function(d){return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');});
  const tDs=[],rDs=[],tLeg=[],rLeg=[];
  yearList.forEach(function(yr,idx){
    const rows=histMap[yr]||[];
    const p=PALETTE[idx%PALETTE.length];
    const bg=withAlpha(p.max,.45);
    _activeItems.add(yr);_allItems.add(yr);
    tDs.push({label:yr+'년',
      data:rows.map(function(r){return r?[r.tempMin,r.tempMax]:null;}),
      backgroundColor:bg,_bodyBg:bg,borderColor:p.max,borderWidth:1.5,
      borderSkipped:false,borderRadius:1,barPercentage:.6,categoryPercentage:.85,_yr:yr});
    _tColors.push(p.max);_tWidths.push(1.5);
    rDs.push({label:yr+'년',data:rows.map(function(r){return r?r.amount:0;}),backgroundColor:p.rain,borderRadius:2,borderSkipped:false,_yr:yr});
    _rColors.push(p.rain);
    tLeg.push({label:yr+'년',yr:yr,color:p.max});
    rLeg.push({label:yr+'년',yr:yr,color:p.rain});
  });
  if(offRows.length){
    const bg=withAlpha(OFF.max,.55);
    _activeItems.add('forecast');_allItems.add('forecast');
    tDs.push({label:'예보',
      data:dates.map(function(_,i){var r=offRows[i];return r?[r.tempMin,r.tempMax]:null;}),
      backgroundColor:bg,_bodyBg:bg,borderColor:OFF.max,borderWidth:2,
      borderSkipped:false,borderRadius:1,barPercentage:.6,categoryPercentage:.85,_yr:null});
    _tColors.push(OFF.max);_tWidths.push(2);
    rDs.push({label:'예보',data:dates.map(function(_,i){var r=offRows[i];return r?r.amount:0;}),backgroundColor:OFF.rain,borderRadius:2,borderSkipped:false,_yr:null});
    _rColors.push(OFF.rain);
    tLeg.push({label:'예보',yr:null,color:OFF.max});
    rLeg.push({label:'예보',yr:null,color:OFF.rain});
  }
  const mkAttr=function(it){const k=it.yr!==null?it.yr:'forecast';const kw=it.yr!==null?it.yr:"'forecast'";return'data-yr="'+k+'" onclick="toggleItem('+kw+')"';};
  document.getElementById('tempLegend').innerHTML=tLeg.map(function(it){
    return'<div class="cl-item" '+mkAttr(it)+'><span style="display:inline-block;width:14px;height:14px;background:'+withAlpha(it.color,.45)+';border:1.5px solid '+it.color+';border-radius:1px;flex-shrink:0"></span><span>'+it.label+'</span></div>';
  }).join('');
  document.getElementById('rainLegend').innerHTML=rLeg.map(function(it){
    return'<div class="cl-item" '+mkAttr(it)+'><span class="cl-dot" style="background:'+it.color+';height:10px;border-radius:2px"></span><span>'+it.label+'</span></div>';
  }).join('');
  const opts=function(yFmt){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:14,color:'#7D7D7D'},grid:{color:'#202020'}},y:{ticks:{font:{size:10},callback:function(v){return v+yFmt;},color:'#7D7D7D'},grid:{color:'#202020'},beginAtZero:yFmt==='mm'}}};};
  if(tempChart)tempChart.destroy();
  tempChart=new Chart(document.getElementById('tempChart'),{type:'bar',data:{labels:labels,datasets:tDs},options:opts('°')});
  if(rainChart)rainChart.destroy();
  rainChart=new Chart(document.getElementById('rainChart'),{type:'bar',data:{labels:labels,datasets:rDs},options:opts('mm')});
}

function addPredToCharts(predRows,dates){
  if(!tempChart||!rainChart||!predRows||!predRows.length)return;
  if(_allItems.has('pred'))return;
  const bg=withAlpha(PRED.max,.45);
  _activeItems.add('pred');_allItems.add('pred');
  tempChart.data.datasets.push({label:'AI 예측',
    data:dates.map(function(_,i){var r=predRows[i];return r?[r.tempMin,r.tempMax]:null;}),
    backgroundColor:bg,_bodyBg:bg,borderColor:PRED.max,borderWidth:1.5,
    borderSkipped:false,borderRadius:1,barPercentage:.6,categoryPercentage:.85,_yr:'pred'});
  rainChart.data.datasets.push({label:'AI 예측',
    data:dates.map(function(_,i){var r=predRows[i];return r?r.amount:0;}),
    backgroundColor:PRED.rain,borderRadius:2,borderSkipped:false,_yr:'pred'});
  _tColors.push(PRED.max);_tWidths.push(1.5);
  _rColors.push(PRED.rain);
  const mkA='data-yr="pred" onclick="toggleItem(\'pred\')"';
  document.getElementById('tempLegend').innerHTML+='<div class="cl-item" '+mkA+'><span style="display:inline-block;width:14px;height:14px;background:'+bg+';border:1.5px solid '+PRED.max+';border-radius:1px;flex-shrink:0"></span><span>AI 예측</span></div>';
  document.getElementById('rainLegend').innerHTML+='<div class="cl-item" '+mkA+'><span class="cl-dot" style="background:'+PRED.rain+';height:10px;border-radius:2px"></span><span>AI 예측</span></div>';
  tempChart.update();rainChart.update();
}

function extractJson(txt){
  txt=txt.replace(/```json|```/g,'').trim();
  const start=txt.indexOf('['),end=txt.lastIndexOf(']');
  if(start!==-1&&end!==-1&&end>start) return txt.slice(start,end+1);
  return txt;
}

/* ── 메인 조회 ── */
async function applyFilter(){
  const sel=getSelected();
  const city=sel.city,country=sel.country,coords=sel.coords;
  if(!city){alert('지역을 검색하고 선택해 주세요.');return;}
  const s=document.getElementById('dateStart').value;
  const e=document.getElementById('dateEnd').value;
  if(!s||!e||s>e){alert('날짜 범위를 확인해 주세요.');return;}
  collapseFilter();
  const years=parseInt(document.getElementById('yearSlider').value);
  const btn=document.getElementById('applyBtn');
  btn.disabled=true; btn.textContent='조회 중...';
  document.getElementById('matrixHead').innerHTML='';
  document.getElementById('matrixBody').innerHTML='';
  document.getElementById('chartPanel').style.display='none';
  saveLastLocation(); saveSettings();

  const lat=coords[0],lon=coords[1];
  const dates=getDates(s,e);
  const startYear=new Date(s).getFullYear();
  const yearList=[];
  for(let i=0;i<years;i++) yearList.push(startYear-years+i);

  document.getElementById('matrixHead').innerHTML='<tr>'
    +'<th rowspan="2" class="ch-h" style="min-width:72px">날짜</th>'
    +'<th colspan="'+years+'" class="ch-h"><span class="sbadge sb-h">과거 실측 '+yearList[0]+'–'+yearList[years-1]+'</span></th>'
    +'<th class="ch-o"><span class="sbadge sb-o">🔵 공식 예보</span></th>'
    +'<th class="ch-a"><span class="sbadge sb-a">🟣 AI 예측</span></th>'
    +'</tr><tr>'
    +yearList.map(function(y){return'<th class="ch-h" style="min-width:130px">'+y+'년</th>';}).join('')
    +'<th class="ch-o" style="min-width:140px">Open-Meteo</th>'
    +'<th class="ch-a" style="min-width:150px">'
    +(document.querySelector('input[name="aiMode"]:checked').value==='stats'?'통계 예측':'AI API')
    +'</th></tr>';

  setStatus('과거 '+years+'년 실측 데이터 수집 중...');
  let done=0; const histMap={};
  await Promise.all(yearList.map(async function(yr){
    const ys=s.replace(/^\d{4}/,String(yr));
    const ye=e.replace(/^\d{4}/,String(yr));
    try{histMap[yr]=await fetchWeather(lat,lon,ys,ye);}
    catch(err){histMap[yr]=null;}
    done++;
    setProgress(Math.round(done/yearList.length*75),'실측 수집 '+done+'/'+yearList.length+'년');
  }));

  setStatus('공식 예보 수집 중...'); setProgress(82,'');
  let offRows=[];
  const forecastMax=offsetDate(todayStr(),15);
  const offEnd=e<=forecastMax?e:forecastMax;
  const offOutOfRange=s>forecastMax;
  if(!offOutOfRange){
    try{offRows=await fetchWeather(lat,lon,s,offEnd);}
    catch(err){setStatus('예보 실패: '+err.message,'err');}
  }

  setProgress(95,'렌더링 중...');
  document.getElementById('matrixBody').innerHTML=dates.map(function(dt,i){
    const mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');
    const wknd=dt.getDay()===0||dt.getDay()===6;
    const histCells=yearList.map(function(yr){
      const rows=histMap[yr];
      if(!rows) return'<td class="cell-fail">'+yr+'년 실패</td>';
      return makeCellHtml(rows[i]||null,'hist');
    }).join('');
    let offCell;
    if(offOutOfRange){
      offCell='<td class="cell-ai-wait" style="font-size:10px;color:#7D7D7D">예보 범위<br>초과</td>';
    } else if(offRows.length&&offRows[i]){
      offCell=makeCellHtml(offRows[i],'official');
    } else {
      offCell='<td class="cell-fail">예보 없음</td>';
    }
    return'<tr>'
      +'<td style="background:#000;position:sticky;left:0;z-index:5;vertical-align:middle">'
        +'<span style="font-size:12px;font-weight:600;color:'+(wknd?'#f87171':'#fff')+'">'+mm+'/'+dd+'</span><br>'
        +'<span style="font-size:10px;color:#7D7D7D">'+DAYS[dt.getDay()]+'요일</span>'
      +'</td>'
      +histCells+offCell
      +'<td class="cell-ai-wait" id="ai-'+i+'"><span class="spinner" style="border-top-color:#7c3aed;border-color:#ede9fe"></span></td>'
    +'</tr>';
  }).join('');

  if(offRows.length) updateKPI(offRows,city,country,s,e,years);
  renderCharts(yearList,histMap,offRows,dates);

  const mode=document.querySelector('input[name="aiMode"]:checked').value;
  if(mode==='stats'){
    setStatus('통계 기반 예측 계산 중...');
    const statsRows=calcStats(histMap,yearList,dates);
    statsRows.forEach(function(r,i){
      const cell=document.getElementById('ai-'+i);
      if(cell) cell.outerHTML=r?makeCellHtml(r,'ai'):'<td class="cell-fail">예측 불가</td>';
    });
    addPredToCharts(statsRows,dates);
  } else {
    const API_KEY=document.getElementById('apiKeyInput').value.trim();
    const provider=document.getElementById('apiProvider').value;
    if(API_KEY){
      setStatus((provider==='gemini'?'Gemini':'Claude')+' AI 예측 생성 중...');
      try{
        const offSum=offRows.filter(Boolean).map(function(r){
          return r.date+': '+r.cond+' 최저'+r.tempMin+'°최고'+r.tempMax+'° 강수'+r.prob+'% '+r.amount+'mm 습도'+r.humidity+'%';
        }).join('\n');
        const prompt='You are a weather prediction API. Respond ONLY with a JSON array. No explanations, no text, no markdown, no code blocks. Just the raw JSON array.\n\n'
+'City: '+city+', '+country+'\n'
+'Predict dates: '+dates.map(function(d){return d.toISOString().slice(0,10);}).join(', ')+'\n'
+'Official forecast reference:\n'+offSum+'\n\n'
+'Output format (JSON array only, nothing else):\n'
+'[{"date":"YYYY-MM-DD","cond":"날씨명","icon":"이모지","tempMin":숫자,"tempMax":숫자,"amTempMax":숫자,"pmTempMax":숫자,"amCond":"날씨명","pmCond":"날씨명","amHumidity":숫자,"pmHumidity":숫자,"amRain":숫자,"pmRain":숫자,"amount":숫자,"prob":숫자,"humidity":숫자,"wind":숫자,"confidence":숫자,"reasoning":"한문장"}]\n'
+'cond values: 맑음/구름조금/구름많음/흐림/비/소나기/눈/안개\nconfidence: integer 70-95\n'
+'IMPORTANT: Return ONLY the JSON array. Start your response with [ and end with ].';
        let rawTxt;
        if(provider==='gemini'){
          const result=await callGemini(API_KEY,prompt);
          rawTxt=result.text;
          setStatus('Gemini AI 예측 완료 ('+result.model+')','ok');
        } else {
          const cRes=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',
            headers:{'content-type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
            body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})
          });
          const cData=await cRes.json();
          if(cData.error) throw new Error(cData.error.message);
          rawTxt=cData.content.find(function(b){return b.type==='text';}).text;
        }
        const aiRows=JSON.parse(extractJson(rawTxt));
        aiRows.forEach(function(r,i){
          const cell=document.getElementById('ai-'+i);
          if(cell) cell.outerHTML=makeCellHtml(r,'ai');
        });
        addPredToCharts(aiRows,dates);
      }catch(err){
        dates.forEach(function(_,i){
          const cell=document.getElementById('ai-'+i);
          if(cell) cell.innerHTML='<span style="font-size:10px;color:#f87171;white-space:normal;line-height:1.4">오류: '+err.message+'</span>';
        });
      }
    } else {
      dates.forEach(function(_,i){
        const cell=document.getElementById('ai-'+i);
        if(cell) cell.innerHTML='<span style="font-size:11px;color:#c7c7cc">API 키 필요</span>';
      });
    }
  }

  setStatus('조회 완료 — '+city+' '+s+' ~ '+e,'ok');
  setProgress(-1);
  btn.disabled=false; btn.textContent='조회';
  setTimeout(function(){setStatus('');},4000);
}
