<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML VAULT</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',Roboto,'Helvetica Neue',Arial,sans-serif;background:#000;color:#fff;min-height:100vh}

    /* ── Header ── */
    .site-header{padding:56px 40px 36px;border-bottom:1px solid #202020}
    .site-title{font-size:clamp(36px,6vw,64px);font-weight:700;letter-spacing:-.01em;line-height:1;text-transform:uppercase}
    .site-title span{color:#FFC000}
    .site-sub{font-size:11px;color:#7D7D7D;letter-spacing:.14em;text-transform:uppercase;margin-top:10px}

    /* ── Container ── */
    .wrap{max-width:880px;margin:0 auto;padding:32px 40px 80px}

    /* ── Back button ── */
    .back-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:transparent;border:1px solid rgba(255,255,255,.12);color:#7D7D7D;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-bottom:24px;font-family:inherit}
    .back-btn:hover{background:#202020;color:#fff;border-color:rgba(255,255,255,.28)}

    /* ── Breadcrumb ── */
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:11px;color:#494949;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;flex-wrap:wrap}
    .breadcrumb .sep{color:#313131}
    .breadcrumb a{color:#FFC000;text-decoration:none;cursor:pointer;transition:color .12s}
    .breadcrumb a:hover{color:#fff}
    .breadcrumb .cur{color:#fff}

    /* ── Count ── */
    .count{font-size:10px;color:#494949;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

    /* ── List ── */
    #list{display:flex;flex-direction:column;gap:2px}

    .item{display:flex;align-items:center;gap:14px;padding:16px 20px;background:#181818;text-decoration:none;font-size:13px;font-weight:500;color:#fff;cursor:pointer;border-left:2px solid transparent;transition:background .13s,border-color .13s}
    .item:hover{background:#202020;border-left-color:#FFC000}
    .item-arrow{margin-left:auto;font-size:11px;color:#313131;transition:color .13s;flex-shrink:0}
    .item:hover .item-arrow{color:#FFC000}
    .item-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#494949;background:#000;padding:2px 6px;margin-left:8px;flex-shrink:0}

    .loading{color:#494949;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:24px 0}

    @media(max-width:600px){
      .site-header{padding:36px 20px 24px}
      .wrap{padding:24px 20px 60px}
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">HTML <span>VAULT</span></h1>
    <p class="site-sub">A personal archive of HTML experiments</p>
  </header>

  <div class="wrap">
    <div id="back-wrap"></div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <p class="count" id="count"></p>
    <div id="list"><p class="loading">Loading...</p></div>
  </div>

  <script>
    var USER="DielK1618",REPO="web-html-vault",BASE="pages";

    function getCurrentPath(){var h=location.hash.replace("#","");return h?h:BASE;}
    function navigate(path){location.hash=path;}

    function renderBreadcrumb(path){
      var bc=document.getElementById("breadcrumb");
      if(path===BASE){bc.innerHTML="";return;}
      var parts=path.split("/");
      var html='<a onclick="navigate(\''+BASE+'\')">HOME</a>';
      var built="";
      for(var i=0;i<parts.length;i++){
        built+=(i===0?"":"/")+parts[i];
        if(i===0) continue;
        html+='<span class="sep">›</span>';
        if(i===parts.length-1){
          html+='<span class="cur">'+parts[i].toUpperCase()+'</span>';
        } else {
          var p=built;
          html+='<a onclick="navigate(\''+p+'\')">'+parts[i].toUpperCase()+'</a>';
        }
      }
      bc.innerHTML=html;
    }

    function renderBackButton(path){
      var wrap=document.getElementById("back-wrap");
      if(path===BASE){wrap.innerHTML="";return;}
      var pp=path.split("/");pp.pop();
      var parentPath=pp.join("/");
      wrap.innerHTML='<button class="back-btn" onclick="navigate(\''+parentPath+'\')">← Back</button>';
    }

    function loadPath(path){
      var list=document.getElementById("list");
      var count=document.getElementById("count");
      list.innerHTML='<p class="loading">Loading...</p>';
      count.textContent="";
      renderBreadcrumb(path);
      renderBackButton(path);

      fetch("https://api.github.com/repos/"+USER+"/"+REPO+"/contents/"+path)
        .then(function(r){return r.json();})
        .then(function(items){
          if(!Array.isArray(items)){
            list.innerHTML='<p class="loading">Failed to load.</p>';
            return;
          }
          var folders=items.filter(function(i){return i.type==="dir" && i.name.charAt(0)!=="." && i.name.charAt(0)!=="_";});
          var files=items.filter(function(i){return i.type==="file" && i.name.slice(-5)===".html" && i.name.charAt(0)!=="_";});

          var parts=[];
          if(folders.length) parts.push("Folders "+folders.length);
          if(files.length) parts.push("Files "+files.length);
          count.textContent=parts.join("  ·  ").toUpperCase();
          list.innerHTML="";

          if(!folders.length && !files.length){
            list.innerHTML='<p class="loading">No items.</p>';
            return;
          }

          folders.forEach(function(f){
            var el=document.createElement("div");
            el.className="item";
            el.innerHTML='<span style="font-size:11px;color:#494949;letter-spacing:.06em;text-transform:uppercase">Folder</span><span style="font-weight:600">'+f.name.toUpperCase()+'</span><span class="item-arrow">→</span>';
            el.onclick=function(){navigate(f.path);};
            list.appendChild(el);
          });

          files.forEach(function(f){
            fetch(f.download_url)
              .then(function(r){return r.text();})
              .then(function(t){
                var m=t.match(/<title>([^<]*)<\/title>/i);
                var title=m?m[1]:f.name.replace(".html","");
                var el=document.createElement("a");
                el.className="item";
                el.href="./"+f.path;
                el.innerHTML='<span style="font-size:11px;color:#494949;letter-spacing:.06em;text-transform:uppercase">HTML</span><span style="font-weight:600">'+title+'</span><span class="item-arrow">→</span>';
                list.appendChild(el);
              });
          });
        })
        .catch(function(){
          list.innerHTML='<p class="loading">Load failed. Check repository visibility.</p>';
        });
    }

    window.addEventListener("hashchange",function(){loadPath(getCurrentPath());});
    loadPath(getCurrentPath());
  </script>
</body>
</html>
